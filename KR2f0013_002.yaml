body:
  text: 包孝肅奏議集巻二宋包拯撰任相晏殊罷相後上臣聞帝王之徳莫大於知人知人則百僚任職天工無曠矣夫宰相者上佐人主以道治天下固非庸材所堪當歴選羣卿以補其闕得其人則輿議厭伏非其人則大職墮斁治亂之本在兹一舉可不慎之乎臣伏見晏殊罷免朝廷必再命相此乃陛下慎擇賢材之時况今百度或闕生民未泰契丹等處交臂伺邊宰相得人則可以上尊朝廷外威强敵陛下庶寛宵旰垂拱仰成矣若但取左右毁譽容易以付大柄恐非國家之福况近臣才與不才皆聖心所盡知在裁之聖斷勿牽羣疑爾臣非次不敢求上殿進對惟陛下特留聖意言災異三篇論日食臣伏見四月旦日當薄蝕陛下特降徳音親决庶獄飾身修政以應天變此誠古之聖后明辟克謹天戒之至意也臣聞漢書云夫至尊莫大乎天天之變莫大乎日蝕盖日者陽之精人君之象也君道虧為隂所乗故蝕日者徳也月者刑也故聖王日蝕修徳月蝕修刑詩云彼月而蝕則惟其常此日而蝕于何不臧說者云月蝕非常比之日蝕固常也日蝕則不臧矣然于正陽之月法尤忌之由是有伐鼓用幣之事故人君或遭兹變必避殿徹膳克己責躬明君臣正上下延納衆議以輔不逮如是之至也今正陽之月晻然日蝕而又亢陽益甚火災繼作害孰大焉得非上天有以丁寧垂誡於陛下耶伏望陛下奮乾剛之至徳畏天地之大異發號施令審思乎利害賞徳罰罪無間於疎昵聴斷不惑勤儉為先抑隂尊陽防㣲杜漸然後日御便殿博延公卿詢訪直言講求古道勵精為治以答天戒如此則積異消於上厲階絶於下足以導迎善氣馴致太平惟陛下留神省察論地震臣近聞登州地震山摧今又鎮陽雄州五月朔日地震北京貝州諸處蝗蝻蟲生皆天意先事示變必不虚發也謹按漢五行志曰地之戒莫重於震動謂地者隂也法當安静今乃越隂之職專陽之政其異孰甚焉又夷狄者中國之隂也今震於隂長之月臣恐四夷有謀中國者且雄州控扼北鄙登州宻邇東夷今繼以地震山摧不可不深思而預備之也頃嵗并代地震尋以昊賊拒命近者廣南英連等州亦震而蠻㓂内侵皆必然已應之兆耳臣近曽上言沿邊将帥尤在得人乞委執政大臣精選素習邊事之人以為守将俾訓練卒伍廣為積聚以大警備之不然懼貽陛下之深憂也况災變之作未有無其應者惟陛下特留聖意論星變臣切見嵗星逆犯房宿近鈎鈐之位于今月餘未順按天官云房四宿為明堂天子布政之宫亦曰四輔股肱将相位也北二小星曰鈎鈐房之鈐鍵天之管籥主閉鍵天心其房心於辰在昴主豫州宋之分野夫五星者五帝司命應王者號令為之節度嵗主嵗事為其綂首好生惡殺安静中度吉變色亂行則不為福或有凌犯淹留不去咎在仁徳未修誅罰未當若犯房宿亦責在将相之不稱職者伏况國家盛徳在火嵗火二曜俱為福星房心又是宋之分野今嵗徳失度逆守于房復近鈎鍵之次徘徊未退本意亦謂人君指意欲有所為而未得其節也乃上天之意所以篤佑聖宋丁寧陛下如是之至夫變異之來各象過失以譴告人主猶嚴父之明戒可不寅畏恐懼乎古之明王必正五事建大中以承天心能應以徳則咎息不能應以善則災至要在所以應之應之之速非誠不立非信不行伏望陛下奮精剛之徳挺獨斷之明内推至誠深思天戒以天下至大祖業至重不可謂承平無事而可以佚豫為治外則邊防之大戎狄可憂内則機務之煩紀律不振况今政失於寛而敝在姑息官弛於茍簡近下詔命澄汰流品而才者未之進不才者未之退盖有司務在因循憚於甄選爾且方内治亂在陛下所任經曰亦惟先正克左右未有左右正而百官枉者也中外臣僚其有老懦貪殘苛剥姦佞不當居職者宜以時廢退益選温良惇厚之士寘之於位令海内昭然知本朝之所貴豈不休哉然後掖庭之中簡去幽曠宦竪之内裁抑重任發號施令在乎必行賞徳罰罪在乎不濫振舉綱目杜絶萌漸如此則災異消於上禍難息於下五緯循軌四時和順召天地之協氣致邦家於永寧願陛下力行而巳臣本以孤危不知忌諱惟陛下不以位疎言賤留神省察則天下䝉幸明體論臺官言事臣伏見近者臺官以朝政闕失上章論列或令分柝或取戒勵中外傳聞於體不便且國家置御史府者盖防臣僚不法時政失宜朝廷用之為紀綱人君委之如耳目所以先帝特降詔書添置侍御史已下六員並不兼領職當時詔令不允官曹渉私措置乖方刑賞踰制並許彈奏雖言有過當必示曲全若事難顯行即令留内盖先帝切於求治如是之極也伏自陛下臨御以來将三十載遵守先訓廣開言路虚懐以待犯顔必容此皆陛下憂勤庶政之至深羣臣仰望清光之不暇矣臣欲望今後御史等凡有彈奏事或過當更不令分析及取戒勵若乃阿意徇私即乞重行責降如此則上彰陛下好諫之徳下免朝廷過舉之失明禮論百官致仕伏以人臣之義七十致仕著在禮經卓為明訓所以優假老成遂其安逸既不違達尊之敎且開知足之端歴代所欽治宜敬切本朝典故尤所重之凡曰引年莫非延世推之半禄待以優恩其於惇勸之方可謂至乎其至也然而近嵗寖成敝風搢紳之間貪冐相尚但顧子孫之計殊愆羞惡之心馳末景於桑榆負厚顔於鐘漏不知其過自以為得誠非朝廷所以待士大夫之意又非士大夫所以遵禮義之常也臣思及此悚然汗下伏望特降指揮御史臺将文武班簿檢㑹應臣僚年及七十並令臺牒諷其致仕如牒舉後三兩日内未見抗章祈請乞自朝廷降令致仕所責稍遏趨營之弊頗惇㢘耻之風請兩制官祀九宫貴神臣近者監察九宫貴神竊見以常朝官充攝太尉行事况屬太祀深恐未便伏覩唐天寳年勑以九宫神實司水旱功佐上帝徳庇下民冀百榖嵗登災害不作每至四時令中書門下往攝祭者又准禮九宫次昊天上帝壇在太廟之上用牲牢璧幣𩔖天地神祗前代王者或親行享祀縁累年以來四方水旱相繼慮是有司供職不謹稍失精嚴欲乞向後四時祭子其攝太尉令兩制巳上官所貴差重其禮以申崇奉之意戒漸論内臣事臣伏覩先朝實録竊見真宗皇帝因對輔臣言及前代内臣恃恩恣横蠧政害物朕常深以為戒至於班秩賜與不使過分有過未嘗矜貸此輩常以畏懼王旦等對曰先代事跡昭然足以為龜鑑而聖慮言及於此實社稷之福也臣竊見近年内臣禄秩權任優崇稍過恐非所以保全之也以陛下英明神斷有罪必罰此輩或不不敢為大過然在制之於漸庶免貽患於後伏願陛下佩服先帝之言以為格訓凡事更加裁抑則天下幸甚慎命令論詔令數易改臣竊見朝廷凡降詔令行之未久即有改張故外議紛紜深恐於體不便且詔令人主之大柄而國家治亂安危之所繫焉可無慎乎縁累年以來此弊尤甚制勑纔下未逾月而輙更請奏方行又隨時而追改民知命令之不足信則賞罰何以沮勸乎臣欲乞今後朝廷凡處置事宜申明制度不可不慎重或臣僚上言利害並請先下兩制集議如可為經乆之制方許頒行於後或小有異同非蠧政害民者不可數有更易如此則法存畫一國有常格伏望少留聖意天下幸甚論功請諡王明臣竊觀太宗皇帝實録載禮部侍郎王明傳言明之節義端勁功烈卓偉其始卒竪立冠於皇朝名臣當太祖太宗時戡靖亂略剗削僭偽駕馭英傑撫定區夏而明感㑹風雲之際周旋金革之間勤餉王師生擒偽将卒能下嶺表平江南繼成大功論籍第一臣每見其事跡想其風采然歎惜明才未盡施而死於太平位未極顯而恩不加諡名爛史諜徳晦泉壤臣素欲表聞於朝乞伸褒勸今忝邊寄復睹明之曽孫雄州防禦推官臨所著家傳國書之外補完遺實利人及物咸足稱紀恭惟尊號陛下奉艱難之業懐忠力之臣宜漏寵靈下慰幽魄至如楊億馮元官與明等或以文詞侍從於先帝或以經文勸講於東宫而皆崇以徽章追賜美諡矧明佐祖宗之休運垂竹帛之異勲既不霑贈爵之榮又未及易名之典使傑然大即殁有遺恨仰祈聖造特賜徳音降付禮官俾定諡法庶發明於茂烈足垂勸於将來今繕寫明曽孫臨所著家傳謹具狀繳連上進論賞論李用和捉獲張海乞依賞格酬奨臣聞功疑惟重迺國之令䂓賞不踰時欲人之知勸抑先聖之格訓又馭邦之大柄也伏見朝廷先以軍賊張海等未獲特立賞格召募使臣如捉獲依傅永吉例優加酬奨近聞右侍禁李用和應募而往不踰數旬果能殺獲張海等四人餘衆並巳潰散用和授東頭供奉官閣門祗候中外聞之無不失望似非朝廷開示大信之㫖也且張海一嵗之内恣行殘暴京西十餘郡幅貟數千里官吏逃竄士民塗炭以至江淮州縣無不震驚前後凡遣使臣悉多敗衂臣竊謂張海之害甚於王倫用和之功優於永吉而永吉左班殿直閣門祗候凡超八資授諸司副使宣事舎人今用和止超四資功同賞異何以激勸将來且有明文豈宜降等况西鄙未定盗賊間起方當責効之際不可失信於人其李用和欲乞依准元降指揮比𩔖傅永吉特與優改官秩如此上之出令貴乎必行下之立功樂於自奮慎差除請復封駮臣伏見朝廷近日凡有除授制命已行或物論未允者則臣寮上疏論駮因而追改者有之然未若精擇而後用之之審也故外議喧然謂進退可否之柄不專於上流聞四方大損國體且兩漢而下並以左曹給事中領駮正之任李唐尤重其選若權用未當則論列于内不顯揚於外盖不欲明君之過沽巳之直也近代則不然但建一策議一官則必揚言於朝以為己功噫為臣之道豈當如是乎竊覩國家循舊例置門下封駮司以近臣兼領未嘗見封一勑駮一事但有封駮之名而無封駮之實因循不振豈不惜哉且歴代典故淪廢多矣此局幸而未墜秪在舉而行之臣請特正封駮之職選兩制以上慎重介直不撓者主之或命諫官兼掌應有除授之制並先由門下其不可者得以辨別是非封進詔勑如此則差易改正兼免漏泄少禆聖政選舉論取士臣以孤逺之迹猥荷聖選擢陞憲府退思所以為報則智識䝉淺無以副上㫖之萬一敢竭愚見唯明主裁之臣伏覩近降詔勑以官吏陞陟賢否相溷世族補䕃愚智不分並立新條以革舊弊有以見陛下求治垂訓之深㫖也臣聞天下大器也羣生重畜也古之聖王御大器保重畜盖各有其道焉以萬務之無極也一統於上豈可以思慮盡之耶故立三公設九卿百執事以維持之俾羣材盡力而百工無曠則王者正其本執其要而天下之大務舉矣故治亂之原在求賢取士得其人而巳漢書曰帝王之徳莫大於知人大抵斯人之情皆希榮進莫不飾正於外藏邪於内邪正所藴淵宻難辨而審之必有術焉以賢知賢以能知能知而用之之謂也且知人與不知人而任之乃得失所繫而安危從之宜乎取士之際不可不慎焉夫三代取士之法濶略難議兩漢而下莫若唐天寳之制自京師逮郡縣皆有學焉每嵗仲冬館學課試乃與計偕其不在館學而舉者謂之鄉貢並責成有司唯以得之與否以為榮辱得士者陞失士者黜孰不公其心以進退乎其得第者但謂之選人有格限未至而能試文三道者謂之宏詞試判三道者謂之拔萃中是選者得不限年而授職復有賢良之科焉所以區别才行慎重名器如是之審也故當時文物尤盛比隆三代基構綿逺垂三百年其有繇矣今之取士則異於是鄉曲不議其行禮部不專其任但糊名謄本煩以繩檢復於軒陛躬臨程試三題競作百篇來上不逾三數日升降天下士其考較去留可謂之精且詳乎臣亦恐非進賢退不肖之長策也周禮升秀辨官司徒司馬大樂正之職未聞王者躬其事也議者謂不若近約唐制歸諸有司或曰取捨之柄當繇人主曰盍使禮部考試定其可否髙下混於奏籍賜第上前抑亦無失於國體矣然後復宏詞拔萃之科明立條目寛限人數嵗一設之其與選者比𩔖奏舉之人以次甄擢而任之有以得其實才矣頃年雖復賢良拔萃之科得人裁一二而巳又罷拔萃之舉恐未足盡魁梧之選也且今之仕者非保任則無以自進若參以二科而精求之則取人之路豈不裕乎而又僉舉之敝漸不可長其間或暱於私愛或迫於勢要不得巳因而舉之者衆繆濫無別宜一警革若至其甚何所及焉方今天下多事邊鄙未寧政失於寛而弊於姑息士弛於務而幸於因循固宜推擇真賢講求治道外則黜郡守縣令不才貪懦苛虐之輩以利於民内則辨公卿大夫無狀謟佞朋比之者以肅於朝杜絶回邪振張紀律可使敎惇于上民恱于下足以導迎和氣馴致太寧不亦盛哉伏望陛下稽前代之成敗驗當今之得失政有未順民有未安則思而圖之圖而行之行而終之則生靈受其福而宗社享無疆之休伏惟陛下鑒其區區恕其狂直一賜觀采請先用舉到官臣伏覩近者降勑節文委中書樞宻院選舉主二十人令舉堪充知州通判知縣各一員者盖國家精擇良吏之深㫖也所有内外被舉之人至今未見擢任兼訪聞逐路轉運使累有體量到州縣長吏等其間不才貪猥之尤甚者欲乞所舉人内先次進用令往彼衝替若候人數足日方議差除則疲乏之民受害深矣况幅貟至廣官吏至衆黷貨暴政十有六七若不急務用人以革其弊亦朝廷之深憂不可不察請依舊封彌謄録考校舉人臣伏覩新定貢舉條制節文諸州發解令知州通判職官令録等保明行實更不封彌謄録者此乃三代里選之法盖朝廷欲先徳行而後詞學責成有司不欲煩以繩檢庶取士有以得其實才矣縁天下郡學自罷聴讀之後生徒各以散去一旦詔下投牒求試者比比皆是長吏等又安能一一練悉行實哉不免秪憑逐人遞相保委然而詐偽猥雜者亦無由辨明兼每州用試官一員是天下試官逾三百餘員必恐未能盡得其人而悉心於公取也或縁其雅素或牽於愛憎或迫於勢要或通於賄賂勢不得巳因而陞黜者有矣又何暇論材藝較履行哉洎取捨一謬則是非紛作不惟抑絶寒素竊慮天下因此構起訟端多矣况封彌謄録行之且久雖非取士之制稍協盡公之道若今來諸州發解舉人且令仍舊封彌謄録考校於理甚便若以勑命方行難於遽改即乞特降約束其逐處試官監試官如稍渉徇私及請託不公並無常法外重行處置不然令别定刑名庶使官吏等各知警懼請依舊考試奏䕃子弟臣伏覩先降勑節文應奏䕃子弟京官年及二十五已上其選人遇南郊大禮限半年許令銓投狀京官每年春季國子監投狀差兩制官於逐處考試内習詞業者或論或詩賦習經業者各專一經試墨義等及格者與放選注官及差遣自勑下之後天下士大夫之子弟莫不靡然向風篤於學問詔書所謂非唯為國造士是乃為臣立家實誨人育材之本也近聞有臣寮上言欲議罷去是未之熟思爾且國家推恩之典其弊尤甚因循日乆推擇未精今詔命方行遂欲釐革則務學者日以怠惰一旦俾臨民政懵然其間不知治道之所出猶未能操刀而使之割也所傷實多其前項條貫如有聞說未盡事理欲乞只令有司詳定依舊頒行包孝肅奏議集巻二
