body:
  text: 包孝肅奏議集原跋孝肅包公名塞宇宙小夫賤𨽻類能談之第其平昔嘉謨讜論關國家大體者雖搢紳間或未盡聞廬江帥毗陵胡公彥國倅建安章公籍一日相與言曰此邦素多竒士如包公實間出也惜其後無顯人弗克為之發揚因搜訪遺藁欲傳之為不朽計有攝助教蘇林進曰林舊藏公奏議集十卷亡於兵火今淮左總司屬官徐公修家有是本請往求之遂不逺數百里手抄以歸前所謂嘉謨讜論悉粲然在目矣帥倅得之喜曰兹可以廣吾志也乃俾祗若是正訛謬鏤板郡學且命録公傳及祠記逸事附於末其好賢樂善之誠蓋如此不可以不識紹興二十七年九月望日左修職郎充廬州州學教授括蒼吳祗若書孝肅包公奏議十卷紹興間胡帥治廬以公本廬人丘墓祠堂在焉命置板郡學艱難悉為煨燼獨嵗時蒸嘗之奉得不廢祀典淳熙元年春郡既肇新學宫别作公像迎致于東序懼其書之弗傳將敬慕有時而怠乃訪舊本於學正湯氏家教授霅川吳公藝又從幕屬假番陽辛氏所藏補亡書七篇是正訛謬及遺脫計二百八十六字遂為繕本鋟版以附新學或公之道未墜於地讀者必慕其為人且以遺君子之鄉知名節取重於世尚友先烈庶幾乎遺風之不泯是磻老區區建學刋書之意也夏五月書成合肥假守東平趙磻老敬書其後
