body:
  text: 包孝肅奏議集巻八宋包拯撰戒興作一篇請不修上清宫臣伏見十一月初二日夜上清宫火謹按春秋傳例曰人火曰火天火曰災漢書五行志曰人火天火同為災異皆以朝廷政令參驗得失而勸戒焉說者曰賢佞分别官人有序則火得其性若信道不篤或耀虚偽則火失其性自上而降濫熖妄起為火不炎上今上清宫者乃祖宗修建以崇無為之徳今火燔之者豈焚修之人不務精潔以副陛下嚴奉之㫖乎不然其天意垂誡於陛下乎固宜勵精治道謹修人事以荅天變可也風聞道路云陛下存留道衆似有繕修之意未辨虚實咸懐危懼况天下多事調發旁午帑蔵未實邊鄙未寧豈可先不急之務重無名之率哉且宫觀之興自於唐室非古制也若謂先聖真容理當欽奉則景靈宫㑹靈觀殿宇宏壯可以奉安願陛下推仁慈之徳念疲敝之俗且務安之安之之理豈忍重困之也然外議紛紜頗甚惑衆欲乞特降詔告諭以安衆心興利請修蔡河堰并斗門臣前權度支判官日竊見蔡河毎年上供斛斗係定額六十萬石見管三十五綱自去年以來般運絶少慶厯五年内只般到一十六萬二千七百六十七石比祖額計虧四十三萬七千七百三十三石縁本河所管綱船至多秋冬行運不絶盖是催綱使臣等不切用心往來催趁致此虧欠萬數不少兼訪聞諸處斗門例皆破壊並不修補其斗門放水自有時候多是官員客旅計㑹不依時候開放洎綱船來時到彼即無水可行欲乞下三司指揮逐縣所管斗門限日近須管疾速牢固添修不得走透水勢仍令催綱使臣與所轄官員常切提舉如依前曲徇顔情及信縱公人受倖不依時候開放致有邀難住滯並乞嚴斷所有綱運或准前拖延不及元額其催綱使臣並乞重行責罰言財利論茶法二章第一章臣竊見國朝茶利課額自收復江浙之後總山場𣙜貨務逐嵗共得錢四百餘萬貫太平興國之初並是實錢其後西北邊急於芻粟入中遂添估耗江淮出茶之所西北入粟之地不相應㑹以是實直盡為虚錢至大中祥符六年七年亦各及三百萬貫末年雖不及元額在京𣙜貨務尚得引錢一百五十萬貫自頃年變法以來惟存虚額其實入之數益少近嵗尤甚訪聞去年江淮共虧一百三十萬貫即未知在京𣙜貨務所虧數目昨准勑節文三司奏據𣙜貨務擘畫以河北客人入納及配率斛斗給過三色交鈔内茶交鈔毎一百貫文貼納三十四貫支與一百貫茶貨近又准勑命應買下慶厯五年分茶鈔減十五貫毎一百貫只貼納十九貫其皇祐元年茶鈔依舊貼納三十四貫縁客人百姓等於河北入納給得交鈔到京毎一百貫只直三四十貫今雖量與減數亦是與配率無異而欲望客旅興販及招誘入官其可得乎近鹽鐵副使仲簡上言利害見送三司相度况前後累經定奪終無捄之之效以致為害益深盖不能究其本原而急於近利使之然也且茶課嵗入數百萬貫所以助經費而寛調度不可不審議也欲望特降指揮令三司将新舊之法子細參詳定酌中之制俾經久可行委得公私利便即具保明申奏更乞朝廷再賜詳酌施行第二章臣訪聞今嵗江淮山場𣙜貨務見積壓累年茶貨一千一百餘萬斤並無客人算請盖自在京𣙜貨務擘畫每茶引一百貫文更貼納三十四貫方支得一百貫文茶貨後來商旅阻節不行毎年課利并稅錢虧欠數百萬貫則國家財用仰給何以取濟今發運使施昌言近巳到闕欲乞令昌言與三司使副将今來茶法子細公共從長定奪合如何擘畫即得公私利濟經久可行言陜西鹽法第一章臣奉勑差往陜西與轉運使并范祥面議鹽法利害縁臣前任本路轉運使備知前來鹽法自慶厯二年因范宗傑擘畫禁𣙜之後差役兵士車牛及逐州衙前等般運鹽席往諸州官自置場出賣以致兵士逃亡死損公人破蕩家業比比皆是所不忍聞其衙前估計家業毎直一貫者即管認般鹽兩席雖家業巳竭而鹽數未足嗟怨之聲盈於道路前後臣僚累言不便乞復舊法通商以捄闗中凋弊有司執議終不施行昨因范祥再有起請兼葉清臣曽知永寧軍見其為患之甚因乞依范祥擘畫用通商舊法令客人於沿邊入納見錢收糴軍糧免虚擡貴價入中斛斗於𣙜貨務大支官錢兼寛得諸般差役勞擾此乃於國有利於民無害理甚灼然但以變法之初豪商猾吏悉所不樂而議者沿其嵗入課利稍虧於前而横有沮議乞復舊法若舊法誠善復之無疑但恐為害浸深耳且法有先利而後害者有先害而後利者若復舊日禁𣙜之法雖暴得數萬緍而民力日困久而不勝其弊未免隨而更張是先有小利而終為大害也若許其通商雖一二年間課額少虧漸而行之必復其舊又免民力日困則久而不勝其利是先有小損而終成大利也且國家富有天下當以䘏民為本今雖財用㣲窘亦當持經久之計豈忍争嵗入數十萬緍不能更延一二年以責成效輕信横議不惟命令數有改易無信於下而又欲復從前弊法俾闗中生靈何以措其手足臣細詳范祥前後所奏事理頗甚明白但於轉運司㣲有所損以致異同耳臣固非憚其往來之勞妄有臆說實亦為國家惜其事體不欲徇一時之小利而致将來大患臣欲乞候到陜西相度如沿邊近裏州軍糧儲有備錢物可以那容得行新法公私未至大害其間或有未便之事即與逐司将通商舊法與今來新法公共從長商量損益且令通行如沿邊糧儲闕乏公私為大不便即具畫一事狀乞朝廷詳酌指揮第二章臣近奉勑差往陜西相度鹽法自入陜西界沿路訪聞民間恐朝廷改法頗甚憂畏盖以前來禁𣙜之後差役人力般運鹽席不堪其苦臣因諭以朝辭日面奉徳音所議鹽法只要便人况聖上卹念闗中生靈必不忍重困人力羣情無不感悅臣今與本路轉運及制置觧鹽司同議且乞依新法施行兼為客人疑惑未肯入中巳牒逐司告示訖其有未便事件雖有減損即不虧官委是公私利便臣竊見天下嵗入錢帛萬數不少而近年財用窘乏何也盖自西事以來三路並仰給三司逐嵗入糧草支𣙜貨務見錢銀絹香茶納數千萬貫是所入有限而所出無限安得不窘乏乎方今邊防無事亦當以國家大計為先若不銳意而速圖之臣恐日削月朘為害不淺萬一小有警急何以取濟臣固謂致朝廷窘乏如是者三路使之然也但令三路各自足用則帑廪何患不實哉只如陜西自有觧鹽之利若盡以付與令計置糧草一二年後可全減𣙜貨務毎嵗見錢銀絹等五千七百萬貫其河北河東雖無觧鹽然出産絲蠶米麥最多兼諸般課利不少河北只以連值災傷朝省權且一切應副若将來豐稔逐路稍減冗官冗兵或移那兵馬近南就食令轉運司多方擘畫計置糧草漸減入中見錢以寛縣官經費不踰三五年則東南財用盡聚京師帑廪必有豐盈之望若乃輕信横議不究本末圖目前之小利忽經久之大計竊恐難以善其後也望陛下留神省察議兵請留禁軍不差出招置土兵臣聞京師者天下之本也王畿之内列營屯衆此强本之兵也而國家近年以來邊陲有警乃一例調發則衛兵日削恐非固宗社制戎狄之長䇿也臣以為畿兵雖有大故不可多調發前所謂京師者天下之本也强本者畿兵耳本固且强繇中制外則天下何患焉若調發不巳則耗其財力而弱其根本不惟隳祖宗之制獨不念李唐天寳建中之事乎善馬精兵悉出於外扈衛驍銳為之一空卒以重其後害此朝廷尤宜深慮也今河北河東沿邊兵寡財匱卒有急難惟有民兵可用往嘗籍之矣籍之未甚長䇿又從而釋之縁河朔之民皆禀氣勁悍義勇奮發矧又生習邊鄙之利害素諳戎人之情偽他路校之不逮逺矣且向時㸃閱捨客取主又責以戸之上下以是籍之所得幾何竊見唐李抱真民兵之制事頗相近故當時招義一軍雄視山東将適今之宜可如抱真之制約而行之不以戸下曰足曰不足悉以丁力衆寡登降其數而籍之不及數者即捨之取其中稍富實者令差出榖闕錢貨以給藉丁之貧家如此得兵可倍往嵗亦可以少抑兼并而貧悴之戸有所仰矣一則供饋不費二則羣情樂為其處置訓練之法即有祖宗之舊制焉河朔民兵既壯而禁軍留實京師則内外安矣今北人詭詐萬狀聲言西討修築城柵㸃集軍馬乗此之際沿邊亦宜宻令繕完而議者但恃盟約殊不設備萬一邀求不巳稍不如意伺釁而發曷以禦之此亦必然之兆得無熟思乎况邊上武将未甚得人且将者人之司命而邦國安危所繫擇之不可不審審将之道不當限以名位但辨其能之可否茍得實材則擢而用之專而委之必有成功若不素為之具緩急旋圖之則無所及矣伏望陛下少留聖意特賜省察請那移河北兵馬事臣聞屯兵備邊古今常制所患民賦有限兵食不充必須廣為經度以給用度或嵗有㓙歉或冦至益兵則暴歛横取何所不至民既困矣敵何禦焉此亦必然之也河北自失山後六州之險無以固守則蓄兵積粟常患不足只如頃年敵忽生變雖復請和終非經久之計兼沿邊沃壤又盡為陂塘租稅既無所入皆仰給縣官雖竭天下之財以贍一隅當無事之時日常窘迫無數嵗之備若少有屯集如何取濟豈可坐觀其敝而不務捄之之䇿哉欲望聖慈特出宸斷宣諭執政大臣應沿邊及近裏州軍兵馬除各留防守外其屯駐駐泊諸軍或令歸營就糧諸軍即分屯於河南兖鄆齊濮曹濟等諸州况逐處地利富實糧儲易致率三年一代遇有警急即時起發不旬日可到豈有後期不及者邪且前代防邊之兵三時務農一時敎戰公私自足未有冗而且衆坐縻廪食虚困疲民如今之甚者然執干戈禦戎狄固不可闕在養之敎之得其宜則上下無困乏之患緩急用之則沛有餘力矣議者若以成兵不可全減即有往年義勇强壯十八萬餘人以充其數縁河朔之民禀性勁悍生習邊鄙之利害素諳戎虜之情偽校之南兵絶為精銳一則不費供饋二則羣情樂為其訓練之法則有舊制存焉若謂兵食粗足虜好方堅趣過目前以為成算憚於更張措置臣恐日削月脧中外益以殫竭一旦用武即暴加重歛民心怨叛則肘腋之下皆為仇怨豈暇禦外寇哉此國家根本之患若不表裏協心銳意而速圖之臨事無及矣惟聖慮裁擇不任懇迫之至第二章臣近曽上言以河北沿邊州軍蓄兵愈多積粟常少乞留防守外其屯駐駐泊就糧兵士等或令歸營及分屯於河南曹鄆等諸州遇有警急即時起發必無後期不及之患若謂邊兵不可全減即乞将義勇鄉兵以代其數臣伏見慶厯年中朝廷於本路先鈔㸃到鄉兵内揀刺得少壯約十八萬餘人作兩番敎閱毎番三箇月自九月一日起敎至二月終罷續准樞宻院劄子只委自逐縣令佐分為兩番敎閲自十月至正月終放免更不支口食訪聞後來因循不敎恐非所以紓患預備之長䇿也雖議者欲省資糧以為惜費之一端又况鄉兵十八萬餘人若分為兩番毎人月支口食九斗鹽二斤共約支糧斛三十二萬餘石鹽七十餘萬斤乃河北一州之賦耳以河北地方千餘里二十餘州軍若以一州之賦給鄉兵十八萬人比之屯駐駐泊就糧兵士一月之費可充鄉兵一嵗之用計其費則甚寡校其利則至博兼土人生而勁悍若訓練稍精足可代戍邊禁旅分屯内地此則利害灼然甚明欲望聖慈特賜指揮檢㑹臣前進劄子必賜裁處指揮論宣毅軍臣竊見近年天下添置宣毅指揮以為郡縣之備誠不可闕也然初議招募之時例物稍厚故民間無狀積惡之輩悉投名籍中官吏等又急於數足以邀旌賞豈暇一一選擇今來所在屯聚乃大為州郡之害驕悍狂悖結成羣黨與效尤相扇動不能制凡有小可差使亦不敢用例皆姑息之今海内無事此輩尚敢如此若緩急驅之禦冦焉肯用命不為禍首幸矣况前後作過傷害官員不少若不早為處置必恐浸成大患其逐處宣毅兵士欲望特行指揮令分擘於諸州互換屯駐所貴散其凶黨免貽後悔仍乞特降宣命嚴賜約束應有罪犯並行决配請移冀州就糧兵士歸本州臣竊見冀州見屯兵一萬二千五百餘人每年約支人糧馬料三十八萬餘石内四千餘人却係真定府就糧約支人糧馬料十三萬餘石其春冬衣賜紬絹共支十萬三千餘疋布一萬六千五百餘叚綿一十三萬五千餘兩隨衣錢一萬四千餘貫料錢等毎月八千餘貫勘㑹本州夏秋稅斛斗共納四萬三千餘石夏稅紬絹五千四百餘疋綿二萬七千餘兩外逐年所少斛斗三十三萬七千餘石紬絹九萬八千餘疋布一萬六千五百餘叚並是轉運司逐時旋擘畫應副大凡兵士就糧須籍儲廪有餘便於計置之處方可屯泊未聞本處軍食不足而能更贍别路兵馬縁冀州所出賦稅至少兼不通水路無由般運北去髙陽闗四程又非控扼之所盖當時臣僚不為國家經久計慮更屯别路兵馬在彼不惟枉費糧食兼亦絶難計置即今本州民力凋殘公私匱乏若朝廷不切處置将來必成大患其真定府兵士十四指揮欲乞專委本路安撫司令宻切相度合作如何擘畫令并家屬漸次抽歸本路州軍安泊况西路易得斛斗事理至便如賜允許只作朝廷意度指揮請移冀博深三州兵馬臣昨准樞宻院劄子奉聖㫖令計㑹河北四路安撫司并都轉運司同宻切相度合那移是何軍馬却於甚處有糧草州軍就食約減省得多少糧草仍具委得穏便連署聞奏臣尋與逐路安撫司并都轉運司宻切相度那移軍馬及減省糧草數目巳連署申奏訖今具逐處那移軍馬減省得糧草畫一如後一冀州那移馬軍十一指揮人員兵士共四千三百八十二人馬九百四十七匹往闕項州軍就食糧草八指揮係真定府所管四指揮往真定府驍銳第三指揮三百五十八人雲翼三指揮第八指揮四百四十九人第十一指揮四百七十三人第十三指揮四百七十一人兩指揮雲翼往大名府第十四指揮四百六十二人第二十一指揮四百七十人一萬捷第一指揮四百三十九人往懐州一萬捷第七指揮三百七十五人往衞州兩指揮係髙陽闗所管并驍捷右廂往恩州第三指揮四百二十五人第五指揮四百五十人一冀州毎年減省得下項糧草料錢一萬四千七百七十五貫糧四萬五千一十二石草一十五萬七千三百一十一束料一萬五千七百三十一石一博州那移振武兩指揮人員兵士共九百四人往澶州一博州毎年減省得下項軍糧糧一萬二千餘石一深州那移馬軍雲翼兩指揮人員兵士共九百七十九人馬四百一十四匹一深州毎年減省得下項糧草糧八千八百八十一石草一十一萬九千二百三十二束料一萬一千九百二十三石二斗右臣實見冀博深三州糧食最為闕少近雖計置得約及一年巳來縁支多收少其冀州又不通水路即今民力困竭便糴輦運俱不能及須且那移兵士往前件州府况逐處軍糧有備兼通黄御河易為般運伏乞聖慈令檢詳前狀早賜指揮請移配河北作過兵士往向南州軍臣竊見河北州軍近年時有兵士結連為過其頭首皆依法斷遣外所是隨從之人及諸般為非勘結之際情理偶未彰灼所司務從輕典各行降配多只於本州或隣近州軍移配近下軍分此輩元是上軍一旦因事降配却於本州或隣近執役見有同𩔖豈無慚悚則包藏禍心轉欲為非扇惑兵伍深不穏便欲乞特降指揮下河北逐路安撫司應今後兵士等作過合行降配並令移配向南州軍本城或牢城收管如合配廣南逺惡處者自依元條施行包孝肅奏議集巻八
