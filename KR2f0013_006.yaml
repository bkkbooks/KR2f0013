body:
  text: 包孝肅奏議集卷六宋包拯撰按劾一十五篇彈宋庠臣等今日中書傳諭奉聖旨宣示宋庠自辨及求退等事臣等蒙陛下擢任處之諫垣惟采取天下公議别白賢不肖敷聞于上冀陛下倚任常得其人以熙大政不使貪冒非才者得以膠固其位害敗于事乃臣等之職分陛下所責任者也固不敢緣私詆欺變白為黑惑亂陛下耳目動搖大臣爵位以取竒譽巧資身計斯亦臣等所自信陛下所明照者也臣等昨於二月二十二日具劄子論列宋庠自再秉衡軸首尾七年殊無建明略效補報而但隂拱持祿竊位素餐安處洋洋以為得䇿且復求解之際陛下降詔未及斷章庠乃從容遂止其請足見其固位無恥之甚也今乃自辨謂臣等議論暗合巳意臣等亦謂宋庠本意暗合天下之議論斯不近於欺乎陛下所深察矣且云無過則又不然臣等竊以前代至于祖宗之朝罷免執政大臣莫不以其謨明無效取羣議而行也何則執政大臣與國同體不能盡心竭節灼然樹立是謂之過宜乎當黜非如羣有司小官之類必有犯狀挂于刑書乃為過也唐憲宗朝權德輿為宰相不能有所發明時人譏之俄以循默而罷復守本官憲宗聰明仁愛之主也德輿文學德行之臣也當時罷免只緣循默不必指瑕末致罪名而然也至如祖宗朝罷免范質宋琪李昉張齊賢亦只以不稱職均勞逸為辭未嘗明其過也近嵗方乃托拾細故託以為名揚于外廷斯乃不識大體之臣上惑聖聽有乖舉措非所以責大臣之義也宋庠豈無細過臣等不言之者蓋為陛下惜此事體臣等所陳惟陛下聖度詳處若以為是則乞依前來劄子早賜施行倘以臣等為謗讟時宰敢肆狂妄亦乞治正其罪重行降黜臣等無任激切俟命之至再彈張堯佐臣伏見張堯佐除宣徽南院使淮康軍節度使兼景靈宫使又同羣牧制置使制命一出中外驚駭緣張堯佐久以非才濫司大計利權反覆物論沸騰臣等纍次論列陛下欲務保全乃曲假寵榮併領要職求之前代則無例訪以人情則不安臣實憂危罔知所措竊惟陛下臨御以來凡所行事悉遵守祖宗舊制未嘗踰越若乃進用臣僚於先朝則李至可謂自尚書參知政事授節度使錢若水舊任樞密副使由工部侍郎只得觀察使於今朝則錢惟演以樞密使兵部尚書授節度使李士衡以三司使兼尚書右丞李維以翰林學士承旨兼刑部尚書陳堯咨以翰林學士兼工部侍郎並授觀察使鄭戩以資政殿大學士尸部侍郎知并州二年只授宣徽使踰年方加節度使此皆國朝之舊典也自非德望兼著亦不輕授今堯佐何者而兼是四職乎况執政大臣與國休戚不能執守建明曲有阿徇成此過舉俾天下竊議謂陛下私於後宮不獨於聖德有損抑又事體不可之至甚者也伏望陛下以祖業為重以天下為意免使姦幸有所窺伺特出宸斷罷堯佐宣徽使之命任以外鎮庶可稍息天下之議第二章臣等近以除授張堯佐宣徽使以物議沸騰曽具奏陳乞詔中書明降指揮向去更不除使相及不許歸本院供職仍促發赴河陽庶幾稍弭謗讟未蒙俞允實切憂慮臣伏以陛下凡事克巳鮮有過舉止於堯佐厚甚不無衆口交非若厭物情理須降抑然自去冬言爭此事陛下幸賜開納天下皆仰聖度能虛懷以徇諫也今來重申前命所以不即論列乞行追奪者蓋為朝廷曲全事體耳其如大恩不可頻假羣心不可固違假之頻則損威違之固則兆亂伏望以國家至計為念檢會臣等前後所上劄子早賜施行不勝懇切之至第三章近為臺諌官纍奏乞罷張堯佐三司使之職及言親連宫掖不可用為執政之官至於優與官爵富貴於體無妨遂除淮康軍節度使充宣徽使兼巳指揮中書后妃之家今後並不除兩府職任質之公論經久為允今來臺諫官却入章疏仍相率請對堅稱堯佐不當授此官職乞行寢罷顯是前後議論翻覆及進對之時喧譁失禮若以常法便當責降朝廷務存政體特示含容宜令誡諭知悉中書劄子第一道知諫院包拯陳旭吳奎等劄子奏臣等伏見張堯佐除授宣徽南院使制命始下物議騰沸况臣等以言為職豈敢私自顧慮以身為計哉直以誕告再行若固守前議復乞追奪於朝廷亦似未安所以進退皇惑不即論列雖然事體有必須裁制者不可不深察臣等不得不極陳也張堯佐怙恩寵之厚僥求覬望不知紀極始欲得宣徽使今訖行前命付與之矣雖出領近鎮將來必求入覲即圖本院供職以至使相重任名器之大者盡可階緣恩私無求而不獲必快巳欲以熏灼天下此不可不深察也伏望思巳前之失為杜漸之制特降詔旨申勑中書門下諭以堯佐比緣恩澤不次超擢享此名位巳為過越將來更不令處使相之任及不許本院供職仍趣赴河陽任所庶幾厭塞人情防杜間隙臣等不勝為國納忠激切之至中書劄子第二道又據知諫院包拯陳旭吳奎等劄子奏臣等以除授張堯佐宣徽使物議喧騰曽具奏陳乞詔中書明降指揮向去更不得除使相及不許歸院供職仍趣發赴河陽庶幾稍弭謗讟未蒙俞允自去冬力爭此事幸賜開納天下皆仰聖度能虛懷而徇諫也今來重申前命所以不即論列乞行追奪者蓋為朝廷曲全事體耳其如大恩不可頻假羣心不可固違假之頻則損威違之固則兆亂伏望以國家至計為念檢會臣等前後劄子必賜施行不勝懇激之極取進止今年八月二十二日進呈奉聖旨如今後張堯佐别有遷改恩命檢會此劄子進呈執奏仍今後宣徽使不得過二員論李昭亮二章第一章臣等伏見宣徽南院使新知澶州李昭亮因赴任到闕朝見復有指揮且令本院供職雖天恩寬假人欲必從然於事體有不可者尤須為國家顧惜綱紀也竊聞昭亮在延州日嘗纍乞移近郡而澶淵據北道之會扼大河之津朝廷素擇重臣以鎮之是委遇之意不為不優矣州境與畿甸相接兼得以便私家之事如昭亮所請不為不從矣以至增南院宣徽之重誕告於廷而遣之今始得覲又欲遂留京師前命廢而不行為昭亮計誠可矣恐非朝廷所以命大臣而大臣於出處間自持慎重之體也外議多云比來河流頗虞決溢之患昭亮以此懇辭不去又不可之尤甚者也古所謂大臣者能與天下國家同其休戚也今其名位兼中外之重亦可以同休戚矣而計較一小利害不肯宣力矧天下利害固有大於此者朝廷欲誰使哉大臣舉措果如此將何以勵小臣哉伏望陛下依前降指揮趣令赴任上以全出命之體下以存承命之信無復開僥幸覬覦之路由大臣始克如此事體所繫不細臣等故敢極論之惟望聖慮必賜裁擇第二章臣伏見宣徽南院使李昭亮近移知澶州到闕朝見遂乞留京師復求邊任臣等尋具論列蒙指揮賜告三月滿日赴任候邊帥有闕許令就移未逾數日却除昭亮知真定府移李昭𫐠知秦州替吕公綽赴闕中外聞之無不竦駭且昭亮先在延州日纍求便郡朝廷優進職名特移近輔既而又圖邊任遽有此命是可否在於昭亮而朝廷之命令不行此豈大臣之所為哉兼昭述初授成德公議巳為不允所蒞之處惟務姑息在成德尤甚緣秦州密接蕃部最為巨屏兵馬素經訓練習知節制嚮來未嘗輕授若一旦令昭述處之遂用成德之政必致士卒驕橫緩急決不得用俾陜西沿邊諸鎮傳聞害事豈不大哉伏望聖慈特降指揮趣令昭亮依舊發赴澶州昭述别與一郡或且令在任公綽候將來滿日别選臣僚移替如此則朝廷命令必行不使僥幸覬覦之人得計則紀綱自正矣事體所繫不細臣故敢再三極論之必望聖慮裁擇論丁度孫甫事乞辨明臣等竊聞翰林學士承旨丁度纍上劄子稱於召對日奉聖旨面諭右正言孫甫言度曽上殿求入兩地今丁度乞賜辨證至今未見指揮物議喧然竊緣任用大臣出於聖斷如丁度實曽上殿妄自求進頗失事體或孫甫所言虛誑中傷近列即乞各與辨明特賜行遣且丁度孫甫俱處侍從之班日被顧問今互有論列未辨曲直若朝廷姑務含容不行降黜則好進者無所警懼言事者得以離間疑惑聖聽隳紊朝綱無甚於此也欲望聖慈將丁度纍上文字早賜降出施行彈郭承祐二章第一章臣等近曽再具論列郭承祐以其上僭不法等事乞朝廷重行降黜今開改差許州部署雖罷知州之權然依前為節度使在承祐所損無幾於朝廷威令則所損至重至深也何則承祐以新以舊曲被優恩有大罪而蒙生全無微功而叨將領便蕃富貴出入寵榮假使殺身未能報德而乃恣逞姦慝瀆亂國經身擁節旄而姑息士卒職鄰樞近而僭越典常命之撫俗而殘民委之留務而生事喧然衆口謂之蓄謀迹其用心實亦不順此其可恕則天下之惡無不可容者矣雖人主曲全臣下過示優矜而凶人不顧君親胡為愓厲况當熙洽之際敢萌跋扈之為是誘藩臣非曰戎首若不痛繩以法斯則漏彼吞舟使包藏禍亂之人何以戒懼而自戢哉兼臣等仍聞承祐在南京非理決配過人及一二百數昨揚孜分析才四十五人而巳實有未盡意其謂何臣等乞再下南京令子細分析承祐在任日決配過軍人百姓依法不依法作兩項聲説的實數目聞奏候文字到日乞朝廷别賜裁處第二章臣等巳三次論列郭承祐乞朝廷據其迹狀重行降黜至今未奉俞旨臣等實以為憂然所憂者非謂以言未從及身計也誠憂國家威令不行則凶人無以戒懼開姦宄之隙發賊亂之萌貽戚將來固不細也聖人思患預防君子見幾而作皆慎於微小則其禍易除及事變之後雖有智謀即能戡定所傷亦巳多矣承祐猖獗奚足顧忌但因之生事則禍亦不輕臣等所以區區不能自止也傳曰除君之惡惟力是視臣等雖其力微不能感動天聽以摧壓橫猾至若自愛其身遇事面從則不忍也陛下何惜一幸臣不正其罪使威令行朝廷肅明示四方之臣庶耶臣等實甚惜之伏乞檢會前來劄子必賜施行無任懇激之至彈李淑二章第一章臣等伏覩除授李淑充翰林學士兼端明殿學士侍讀學士者竊以李淑未丁憂間只帶侍讀端明兩職嘗坐吟詠刺斥前朝語涉怨尤事干烈祖以此差知南京自陳親老遂乞侍養相次又却充職當時物議以謂才乞養親遽乃求仕無致養之樂有謀身之端又以其前過至深不可處之親近羣言未息旋即居憂今來服除始還舊貫仍居學士之職乃處禁林之重何故崇署之至如此哉臣等所未諭也且李淑素行前後言者多矣陛下亦具悉矣臣等不復一一陳數但指其甚不可者陛下裁處無使萬世之下致譏於朝廷則臣等之責塞矣非於李淑有嫌隙也臣等讀漢書見轅固與黃生爭論於景帝前及湯武受命事當時猶為隱避不終其説漢景帝與湯武相去千餘年非其祖宗尚乃置而弗論何則嫌其類也以仲尼之將聖於區區魯國亦為之諱蓋禮則然矣李淑父子蒙國厚恩其身久處清華官職俱顯秪以纍守外郡未獲大用意懷怨憤遂假前代為名譏切本朝迹其用心誠罪不容誅者也暨緣羣議稍示薄責淑乃曲辨益肆妄端欲遂一巳之非以易大典之序此而可恕誰不可恕哉又於吕夷簡墓志有遏猾雞晨之語臣等伏以陛下奉事章獻太后於母子之際無纎毫之間蒸蒸孝治格於羣黎謂之雞晨實纍上德其中更有甚不可者臣等不忍言也淑之所為敢爾悖慢陛下仁惻篤顧舊物雖隱其甚惡不賜顯誅在乎物情巳為恩貸今又增一學士處之禁塗衆議喧喧實甚不平况母年八十别無侍子臣等伏望陛下宸斷落其翰林學士與一外任或令侍養如此則懷姦隱慝之臣有所戒懼不敢謗讟矣第二章臣近者兩次論列以李淑前過至深不可處之親近乞與外任或令侍養今聞祗罷翰林學士依舊充侍讀之職况李淑父子荷國厚恩榮幸俱極輒敢私懷怨望譏切祖宗非所宜言天下共憤昔漢宣帝時楊惲但以怨刺之言尚坐棄市迹淑罪狀不賜顯戮巳為寬貸兼母年八十别無侍子在乎禮律不合從政而貪冒寵利殊無畏憚且陛下日御講筵博詢經義當用篤厚方正之士以備師臣之列豈宜以姦險悖慢之臣得預進讀於前哉此尤不可之甚者也伏望陛下檢會臣前後劄子特出宸斷與之外任或令侍養庶幾稍塞中外之議彈張若谷臣聞引年致政抑有定規殉祿貪榮頗傷清議竊見龍圖閣直學士兵部侍郎知洪州張若谷年近八十自登膴士亟踐清塗久越從心之年未有乞骸之請雖聖朝眷待近侍進退以禮而大臣去就之義安可罔然不知伏况江西重地為一都會兵賦繁盛控扼上遊尤在得人以之鎮靖兼檢會御史臺先有起請乞行頒示而張若谷未能引退尚此冒居人之寡亷一至于是欲乞申明前命諭之致仕或與別移一郡彈王逵七章第一章臣訪聞江南西路轉運使王逵行事任性不顧條制苛政暴斂殊無畏憚州縣稍不徇從即被捃拾吏民無告實可嗟憫按王逵先任荆湖南路轉運使日非理配率人户錢物上供以圖進用山下居民苦於誅求逃入蠻洞結集凶黨致此大患于今未息沿江重地幅貟千餘里財賦戶口尤盛亦與蠻界接連不可久任匪人切恐為國生事且楊紘但以體量官吏過當尚降差遣况王逵害民蠧化衆議不容欲望聖慈特與降黜則天下幸甚第二章臣近以江南西路轉運使王逵所為任性加以殘酷不可令久居表率之任乞降差遣竊知下本路提刑司體量且提刑與轉運使俱是按察之官事相關連寧無私徇縱使情狀的著恐未必能遵朝旨兼王逵先任荆湖之日以非理配率錢物臣僚奏劾降知池州尋該赦宥移福州未幾又自揚州移今任雖遇霈澤棄瑕録用然刻暴之性難以悛改凡所為事布在朝野無不具知且非曖昧臣與王逵素不相接但以物議不允須至上言伏望聖慈特出宸斷只令依楊紘例降一小郡所貴天下酷吏稍知警懼第三章臣近者兩曽上言以新授淮南轉運使王逵纍任皆以慘虐不法降黜差遣縱該赦宥不可復任職司乞追還勑命至今未蒙施行按王逵前後三四任轉運使惟務掊尅生靈凌辱官吏任性率易不顧條制雖朝廷未欲廢棄只與一郡巳是寬恩於逵何損且赦文優厚所以軫念黎元之至深也今淮南幅貟數千里最為富庶財賦錯出朝家仰給若命酷吏為之職司而令一路之民獨受其患是一夫之幸而一路之不幸也切恐傷陛下愛民恤物之心况薛紳楊紘止以體量官吏過當别無罪狀尚降任使未與牽復以王逵所在殘暴猥濫之狀彰灼如是而上下蒙蔽曲加擢用亦何以示懲戒於後哉實為朝廷惜之欲望聖慈特降指揮令只依薛紳楊紘例與移一藩郡則為害差小第四章臣先曽上言以江西轉運使王逵行事任性所為酷暴不可令居表率之任乞降差遣尋蒙中書劄子下本路提刑司體量無何提刑髙良夫未到間提刑李道寧又移知瀘州却係王逵權兼管勾泊見朝廷指揮必是妄疑前知洪州卞咸到闕説其殘虐之狀遂令諸色人等首告卞咸在任事件一面差官根勘且卞咸替罷近及一年以朝廷體量之故即虛有猜嫌方行捃拾以逞私憾又令前提刑李道寧録狀舉留乃是輕侮朝廷之甚所有卞咸被人陳告不法之事乞從别路差官照勘其王逵不可令更在本任亦乞與移别處差遣免致煆成大獄枉陷非辜第五章臣伏聞就差知徐州王逵充淮南轉運使中外聞之無不駭愕按王逵纍任荆湖南北路江南西路轉運使並以所為慘虐黜降差遣昨任江東轉運使恣性狂率愈甚於前未幾降知光州又改今任雖該霈澤棄瑕録用然刻暴之性難以悛改凡所行事布在朝列無不具知固非曖昧且陛下軫恤生靈惟恐不及豈忍以一方民吏俾王逵殘害伏望聖慈特賜追寢詔命且令依舊知州第六章臣近者上言以就差王逵充淮南轉運使乞追還詔命且令依舊知州未蒙施行按王逵先任荆湖南路轉運使日非理科率人戶錢物致山下居民苦於誅求逃入蠻洞結集凶黨為國大患近年方息臣僚論奏遂降知池州次任江南西路轉運使又枉行徒配民吏不少尋朝廷下本路提刑司體量乃妄疑前知洪州卞咸到闕説其殘虐之狀遂行捃拾以逞私憾凡追攝干繫五六百人在禁煆成大獄及别路差官再勘仍推究出王逵罪犯尤多朝廷亦不曽盡理施行却除河東轉運使自到本任凡所行事愈更率易殊無畏憚尋以舊事發覺被劾秪降知光州未幾又移今任雖該霈澤録用緣王逵姦險慘毒之性無改悔之理且淮南財利錯出朝省仰給發運司嵗運軍儲六百萬石亦藉本司公共協濟方能辦集以王逵狠愎任性必也違戾敗事不止一路官吏軍民獨受其害矣據其事狀衆議所不容豈可更令居表率之地且與一郡乃是朝廷之寬恩也第七章臣近者與陳旭吳奎凡六次論列以新授淮南轉運使王逵乞與改授藩郡至今不蒙施行蓋臣等之言不足取信於朝廷如是之甚俯仰慚懼不知所措臣今略具王逵逐任事狀伏乞聖慈特賜睿察按王逵先任湖南轉運使日非理率配數十年役過里正令納見錢只潭州係七百餘戶雖子孫淪歿及賣過産業者並令見佃人陪納凡干連數千戶其部下諸州率皆類此一路之民例遭枷錮逃移死亡者無數及臣僚論奏朝廷特與放免又隱匿朝省指揮數月並不遵稟一向催納因事發覺遂降知池州其他違越之事不更條陳故臣僚上言伏見王逵凶暴無識殘忍有餘列位簪紳心同蛇蝎因緣姦詐遂忝職司在湖南日酷法誅求財利茍圖進擢民被殺者罔知其數黜降之後潭州父老數千人共設大會以感聖恩與人去害在城數萬家三夕香燈徹曙又被苦之家並刻木作王逵之形日夕笞撻其人心憎惡如是及任江西轉運使依前殘酷枉法徒配民吏恣行威福臺官舉劾遂下提刑司體量適屬髙良夫未到李道寧移任王逵權本司公事乃妄疑前知洪州卞咸到闕説其事迹遂追捕平民數百人只於本州倚郭兩縣收禁搆成卞咸之罪况卞咸替罷將及一年方行捃拾以逞私憾中外莫不扼腕憤嗟臣僚繼有章疏遂移荆湖北路未幾復授河東所為恣橫愈甚於前嘗至撫州筵上與郭志髙酒醉詬爭逺邇驚駭尋又張圭進狀指論前知福州日在任贓濫不法事件俱有實狀竟不曽盡理勘劾止降知光州據其罪名不可悉數雖該赦宥不可復付以表率之任且執政大臣所宜與國家進才良退苛暴規恢治體沮勸將來今乃不恤人言固用酷吏於一王逵則幸矣如一路不幸何臣實為朝廷重惜之伏望聖慈令取索前後臣僚奏狀并章珉先勘卞咸獄收坐及張圭所論之事同送御史臺依公定奪即顯臣言非妄仍乞檢會臣等纍進劄子早賜施行况楊紘薛紳王綽王鼎本無殘虐之狀只以行事或有過當尚降差遣不與牽復職司較之王逵彼實非辜臣所以不避煩猥重此部述惟陛下特賜裁處請勘閻士良臣伏見許州通判太常博士張士安奏準勑赴蔡州制勘駐泊都監閻士良與知州陳述古互相奏論兼準勑連陳述古狀據官員人吏僧尼等首閻士良強買騾馬牛羊及乞取錢物共七十五狀并據士良論述古私役兵士恣橫不公事其出榜召到陳首閻士良八十七狀不敢一例根勘巳送本州及申奏者竊緣閻士良陳述古互論不法事件至多所出榜召到陳首閻士良八十七狀亦合晝時行遣不合却送本州顯屬避事欲乞特降指揮令本勘官將所召到陳首士良八十七狀疾速理勘一就結案兼訪聞一行干連人數不少炎酷方熾縲繫頗久罪非本犯情實可憫且干連人等應係照證各有歸著如該杖罪巳下之人亦乞令本處一面先次決遣疏放盛暑之際免淹刑禁請罷知雄州劉兼濟臣近以新差知雄州劉兼濟材庸識暗素無亷節當此邊寄中外之議共以為不可乞選有材略武臣充替至今未蒙施行臣伏見聖慮以河朔事體至重故進任大臣節制一路誠為長䇿然沿邊守將未甚得人此不可不精擇也如祖宗朝用何繼筠李漢超何承矩李允則以禦北鄙皆極一時之選是致邊方寧肅朝廷無北顧之憂蓋委任得人之明效也方今不患乏材但患不能用爾緣雄州最為控扼重地尤不當輕授事機少失雖悔何及且戎虜之性詭詐萬狀殊不可測今既無名搆是釁隙故必有為之謀者可不熟慮而預防之哉伏望聖慈特令檢會臣前來劄子早賜施行庶免緩急誤事論李綬冒國親事臣竊聞舊開礬鋪進納授官人李綬男與故申王宫承俊為親將就婚卺中外傳聞莫不駭愕檢會御史臺編勑節文應皇屬議親並令具門閥次第委宗正寺宫審覆須的是衣冠之後非闒冗庸賤之伍富商大賈之門差涉不實會赦不原其罪仍仰抨彈之官常加采聽又太常禮院勑大宗正司奏不是工商伎術之家聽許為親其李綬男正礙條制竊以伉合之序貴於匹敵氏族之選屬在名勝蓋禮教之重所宜謹嚴人地之華必資參擇按李綬闒冗之餘軒裳所絶嚮緣進納巳濫寵恩豈可更冒瀆國姻塵鄙公族使天支之秀下偶非類汨紊彛制虧損朝美臣請罷其婚媾别求德閥仍乞申命有司今後國親並須依勑選定請追任辨官臣伏見近降勑命以免追官勒停人任辨授太常少卿物論喧然未為允當訪聞任辨先知汾州日所犯罪名至多除輕罪外凡額外占使兵士一百一十六人令織造駝毛假子及打三黃鎖諸般私下雜作並是名目破剩人數計二萬三千六百餘工計庸紐贓絹一千六百餘匹有零據法寺準律監官及主司於職掌之所私役兵防者計庸準盜論其任辨合於流三千里私罪上定斷事該疏決降從徒三年私罪官減外合追太常少卿更罰銅一十斤放奉勑特免追官罰銅一十斤勒停者竊以長人之任表率為先既自犯於邦刑宜不齒於朝序按任辨本以庸質濫兹重寄不能正身蒞下而乃徇利敗官雖該赦恩例許録用原其罪狀當置冗散豈可牽復舊職列在卿曹即事緣情實辜聖化况任辨雖免追官勒停亦合降資敘用欲乞追還新命無授他秩則賞罰不濫清濁有别俾天下貪猥之輩漸知警懼論閻士良轉官臣等伏見六宅副使閻士良除授崇儀使罔測緣繇中外疑惑蓋自明堂覃恩之後臣僚非著灼然功效未嘗有超越遷轉者按士良先任蔡州都監日以不法坐罪黜降不逾數年復升職任今又不次驟正使名物議喧然以為不可且河朔塘水當無事之時亦可助邊防之固但存舊制公私為便頃嵗楊懷敏興修不巳大為民患纍有臣僚論列遂令依舊自士良繼領是職訪聞復以創置屯田為名疏決水勢飄浸鄉村沿塞居民尤被其苦况逐州軍自屬長吏等管構豈假更設斯局兼士良到闕奏事僅及兩月遷延不去必是以此為功邀求進秩既得之後何所不至寖開僥幸之路或構戎虜之隙則為害不細伏望聖慈特許追奪前命以戒將來及移士良與别路差遣庶免向去别啓釁端請罷王渙𣙜貨務臣等伏見監𣙜貨務王渙先任京官知濟州巨野縣日曽犯贓罪除名編管自後改除班行勾當作坊之時又犯贓罪去官其人賦性貪回用心狡獪善能交結以恣其為只如先降條貫勾當𣙜貨務須是三司副使同罪奏舉方可差除王渙意欲僥求限以其制遂乃作計先授監左藏庫而後論列稱奉內朝班次不便乞改差勾當𣙜貨務朝廷不知其纍犯贓罪因而聽從物議紛紜謂長姦計是乃狡獪之明驗也且𣙜貨務之於省司表裏相濟其任至要所繫甚重施設出納最須得人豈可使贓汙之餘妄居是職公然肆志無所顧忌商旅喧而上欣國家浸以遺利儻不速為解罷則其為害可勝言哉臣等以為王渙前後犯狀彰明衆所共棄乞賜停廢永不别與差遣如此則憸人畏法莫敢自恣而流品一清矣兼聞馬誥亦纍乞解罷伏乞嚴降指揮三司副使選舉曉財利有心力清亷強濟朝臣使臣兩員共幹其任必能辦集則大計有賴而國用庶幾乎足矣辨理請留吳奎依舊供職臣伏聞勑差起居舍人吳奎知密州臣近因上殿親奉德音宣諭以唐介彈奏大臣事及吳奎臣亦粗陳本末緣吳奎荷陛下不次擢用孜孜言事不避權幸以是忌嫉者衆非陛下英明博照無保全之理况唐介輕妄之詞誣罔天聽固聖鑒悉以辨明矣臣以無狀待罪諫列不能補報以負天下之責豈可見朝廷事有過舉循默不言而令諫官橫被惡名哉雖吳奎補郡私願甚便然公議痛惜之欲望聖慈且令依舊供職臣區區之心非謂吳奎所惜者朝廷事體蓋不欲使姦邪者得計則臣之責塞矣惟聖度曲賜裁察則天下幸甚包孝肅奏議集卷六
