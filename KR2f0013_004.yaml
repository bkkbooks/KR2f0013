body:
  text: 包孝肅奏議集卷四宋包拯撰去刻薄請不用苛虐之人充監司第一章臣竊見諸道轉運司自兼按察及置判官以來并提點刑獄等體量部下官吏章疏相繼頗傷煩碎兼聞審刑院大理寺日近奏案尤多倍於往年况無大假罪名並是掎托微纍不辨虛實一例論奏孤弱無援者則按以深文權勢豪猾者則縱而不顧內則徇一身之利以殖其私外則竊振職之名以圖其功效尤無耻惟恐不及至有公清守節之人或不曲諂左右為衆所嫉者即被加誣構成其罪遂使守巳之士或負終身之玷可不痛惜哉且治平之世明盛之君必務德澤罕用刑法故董仲舒曰陽為德為春夏當和煦發生之時隂為刑為秋冬在虛空潛伏之處以此見天任德不任刑也王者亦當上體天道下為民極故不宜過用重典以傷德化昔暴世涉網凝密動罹酷害不下堪命卒致潰亂老子曰其政察察其民缺缺其政悶悶其民淳淳臣願聖明鑒於此言而無忽焉方今民力凋殘國用窘迫若乃專用刻薄好進之吏則民不聊生竊恐非國家之福也雖朝廷纍降詔命約束罕或遵稟此弊不去為患寖深欲望聖慈宣諭執政大臣應轉運提刑等並令精選亷幹中正之人以充其職苛細矯徼之輩屏而不用天下幸甚第二章臣先曽上言以諸道轉運使自兼按察及置判官以來并提點刑獄等體量部下官吏頗傷煩碎兼審刑院大理寺奏案尤多倍於往年况無大假罪名並是掎托微纍不辨虛實一例論奏此蓋茍圖振舉之名以希進用之速爾遂使天下官吏各懷危懼謙慎自守者則以為不才酷暴非法者則以為幹練人人相效惟恐不逮民罹其患無所訴告殆非陛下委任之本意也其被體量之事或智慮所不及此人情偶不免若非切害亦可矜憫雖欲改過其道無繇豈不痛惜哉兼訪聞天下茶鹽酒稅逐處官吏曲徇轉運使之意以求課額羡溢民則例遭配買商旅則倍行誅剝為國斂怨無甚於此且朝廷設按察提刑之職蓋欲去貪殘之吏撫疲瘵之俗今乃務為苛細人不聊生竊恐未為國家之福也比者幸屬郊禋盛禮大霈慶澤欲乞於赦書特行約束凡官吏先被體量者情非重犯咸許自新後或不悛必置於法庶使悔過之人免負終身之纍其諸處茶鹽酒稅亦乞除元額外不得擅增課利搔撓人户應係自來諸般調率且乞權罷以安海內生靈之命伏望聖慈少賜省察抑僥幸請絶內降臣竊見天聖中凡有內降莫測夤緣盡由請託蓋傾邪之輩因左右之容假援中闕久瀆聖化幸陛下親覽庶政首革兹敝僥榮濫賞人不以幸得今數年以來此路寖啓妨公害政無甚於此臣欲乞今後應中外之人隂有交結或冒陳勞效以圖榮寵或比緣罪犯茍希橫貸伏望聖慈特降詔旨一切迸絶如更妄有陳乞並令中書樞密院三司使核議等處詳先降指揮依公執奏母得阿徇上纍聖明論明堂覃恩臣伏覩明堂赦書應文武百官內臣並與遷轉臣先以風聞曽具論列并乞召對不蒙聞可退用憂迫弗皇啓處竊以爵祿者天下之公器而邦國之大柄也惟士之有功與德所宜處之非此二者不可濫與夫人君者固宜慎之惜之茍輕用之則壞公器而失大柄一綱或紊百目皆隳雖善為治者亦末如之何况今吏員益衆財用益殫為國計者自當澄汰冗雜以寬調度豈可不辨能否普加官爵是於太平之世行此姑息之事但恐賦租之廣不足充其祿倉廩之多不足充其欲紀律一弛天下蕩然有必致傾覆之弊矣臣又伏讀近降詔旨今後應內降特與恩澤及免減罪犯並仰中書樞密院并所承受官司具前後詔勑執奏不得施行有以見陛下厲精革弊求治之切至也惟此覃恩頗蠧政之甚伏望陛下上稟祖宗之訓下為社稷之計所有今來遷轉恩闕乞賜特行裁處免千古之下以纍聖德之萬一臣過叨寵擢位疏責重區區之懇不能自已伏望陛下留神省察天下幸甚請令江淮發運使滿任臣聞東南上遊財賦攸出乃國家仰足之源而調度之所出也主是任者可不慎選哉臣觀唐室如韓滉杜佑王播輩並以將相大臣出鎮淮南浙西專總是職或十年或二十年蓋以利權之重得人是藉今則不然凡蒞其局者但為楊歷之資耳旦方受署夕巳望遷廣納苞苴交結勢要市恩售進惟恐不及其財利豐耗饋運欺隱未嘗校視則建明利害裁制出入豈暇留心哉秪如近年林濰李宗詠楊日華等各未逾三數月旋即罷去移易之速甚於傳舍不獨送故迎新寖成大弊抑亦老胥猾吏緣此為姦不可不察也臣欲乞今後應差江淮制置發運轉運等官各於臣僚中選擇素有清望幹才者並令任滿數周年或有成績就與進秩所冀弊原漸革邦儲增益論先舉三路知縣不得令監當臣伏覩先降敕節文以河北陜西河東知縣比之諸路民賦邊備嵗計不少尤須得人委臣僚選擇兼勤幹事之人於前任職官令録內同罪保舉充京官知縣者自降勑文之後臣僚或有保舉之人降告勑於本任改京朝官仍於本處待闕候逐路有知縣員闕即便就差蓋朝廷以邊鄙未寧財用不足安民集事尤在得人所以委羣僚精擇良吏不循常格就轉優秩用綏疲俗以濟調度之深旨也其所舉之人秪合並充三路知縣訪聞數內著作佐郎魏及甫見監河中府白家鹽場大理寺丞唐叔夏見監并州軍貴庫大理寺丞何澄見監并州永利監著作佐郎葉仲館見監滄州鹽山稅著作佐郎董之邵見知坊州録事參軍臣細詳勑意為比逐路稅賦科率稍重諸縣闕人是以不次甄擢其前項官顯是不合差於逐處監當并知録深屬不便其魏及甫等欲乞依應元勑各與改差本路知縣切恐更有似此不係親民者亦乞勘會一例移改所冀繁劇之邑無可責成僥幸之人免或避事論縣令輕授臣聞古之所重為民父母者縣令耳今之所賤而不能振起風教者亦縣令耳蓋擢用之際未精其選凡有清流素望或稍挾權勢之人即茍謀他官恥為縣道但庸人下品甘於其職雖郡𨽻吏卒皆能訶制茍免罪戾之不暇欲振起風教為民父母其可得乎且今朝廷仕進清選大臣子弟偶緣文墨或希辟命即自下僚擢升館職不然才出外任列為僉判不繇為縣便作通判知州洎為長吏昧於民情懵然其間不知治道之出况四方多務令長尤在得人欲乞今後貼職并僉判及京朝官凡歷任中不曽任縣令及知縣者不得便為長吏按察之官且令知縣方得入通判知州如此則宰邑得其人長吏亦不能幸求而至奏許懷德上殿陳乞臣伏詳近降條貫應係臣僚上殿不得陳乞恩澤並令閣門報告如違仰御史臺彈奏者竊見近日臣僚殊不遵稟例以奏公事為名因而僥求者多矣昨兵部郎中馬絳差知越州因上殿敘述乞改官續又羣牧判官吕昌齡自河北印馬回上殿亦乞省府差遣雖各有臺諫官論列然並免勘罰致今來馬軍副都指揮使許懷德復上殿乞轉觀察留後緣懷德近授觀察使纍任别無顯效而不顧邦憲冒瀆聖聼人之寡亷一至於是欲望特賜取勘施行仍乞今後但是臣僚因奏事陳乞恩理者或有彈奏並乞依條勘劾重行朝典庶使僭妄之闕應修造使臣乞依宣命不得乞轉官臣伏見三司修造案見管營房倉庫店宅等四百餘處計屋四萬餘間並係合該修蓋今來重建太祖開先殿雖功用甚大然王者崇奉之意誠不可闕所有看池樓福聖院等並準傳宣權住竊慮非次别降指揮依前興作緣近年土木之功未嘗暫息材植工匠即日闕乏兵士勞役動有咨怨兼逐處並差內臣監修不以有無準備立須辦集惟務速畢以圖轉官况國家倉廩未實財賦有限費用無極將何取濟伏望聖慈省察候開先殿畢功日除營房倉廩等合修葺外應係寺觀園苑不必一時集辦乞一切權罷兼詳景祐二年二月八日宣命節文應修造了畢使臣一員工匠等並不得乞改轉酬奬如顯有功績即等第與支賜如違當行勘斷欲望今後監修使臣等並依宣命指揮更不得陳乞改轉如有實效只與支賜請令提刑親案罪人臣伏見國家設按刑之司蓋慮郡縣長吏或不得人刑罰寃濫俾之紏察而大獄出入未尚按問細故增減即務舉劾是小過必察而大罪不訶何以副聖人欽恤之意哉今敢略舉一二以明之臣昨任端州日獄中重囚七人具案巳就適會提刑司巡歷將至聞其未斷即遷延引避又鄰近春州禁勘罪人追捕甚衆縲繫二百餘日凡該大辟罪者四五人徒罪不少亦不聞提刑司推究淹延之狀洎轉運司取公案委官定奪果有失入死罪等雖官吏悉行重典而死者不可復生竊恐天下刑獄似此寃枉者至多雖前後纍降詔勑丁寧罕或遵守臣欲此今後諸州凡勘大辟罪不以軍賊百姓五人巳上并出違日限者並委提刑司晝時親往審問決斷所冀刑獄無或寃濫正刑八篇乞斷韋貴第一章臣伏覩宣命以權保州兵馬監押供奉官韋貴降兖嶽州監稅中外聞之無不驚憤况韋貴當兵士構叛之時不能死節為其戎首同惡相濟致朝廷用兵攻取纍降詔諭方且開門納欵今若酬其後效特貸深刑此而可容孰不可恕夫人臣無將將則罪死無赦且將有其意尚無可免之理况悖逆之狀如是之甚乎兼聞韋貴嘗發妄言激成逆志逮凶徒之竊發叶姦計以圖全悖理亂常天共棄及上師之進討據堅城而請命要求撫納以蓋前愆質諸人祗所難容捨致之刑辟允為得宜設欲從輕免其孥戮只乞於逺惡處安置亦朝廷屈法推恩之寬典也第二章臣近者上言以新降充嶽州監稅韋貴欲乞重行處置以伸國法至今未奉指揮竊緣保州雲翼兵士見謀背叛戕賊長吏固守城壁其巡檢使王守一走馬承受劉宗言不從逼脅相繼遇害而韋貴不能死節仍助凶威主領叛徒凡二十日劫奪財物戮辱良善一城生聚死者幾半以至登陴拒守纍抗王師及攻具外合衆心內潰竄伏無路方乃開門請命要君怙亂無甚於此朝議録其罪愆使圖後效免死為幸况冒難致死者曽未甄録而同惡相濟者又不謀責臣竊恐無由奬激忠議而垂誡將來也其韋貴如未欲便行嚴斷即乞於逺處編管請重坐舉邊吏者臣伏覩近降勑命以樞密直學士知益州蔣堂為奏舉前保州通判祕書丞石待舉不當罰銅四十斤放案石待舉殘虐屯兵刻削廩食羣凶相扇固守城壁殺害民吏幾成大患原其情狀免死猶未塞責而保任之者止從輕典竊恐不足以誡其監舉也緣河朔三路軍民財賦事務繁劇長吏僚佐尤在得人所以申命近臣同罪保舉蓋國家慎重選擢如是之至也而論薦之人不能體認朝廷求實才備急用之意但緣其雅素或昵於愛私或迫於勢要或通於賄賂勢不得不因而舉之又何暇論材器較治行之詳悉哉致一旦用之為國生事不可不深慮也臣欲乞今後應河北陜西河東知州軍通判兵馬都監巳下依舊令兩制巳上臣僚舉曾厯三路差遣諳悉邊事京朝官及武職等委是精當方得以次選用如擢用後稍下如舉狀並乞同坐重行朝典論疏決臣竊見常年四五月內皇帝親臨疏決罪人並從減降巳成定制竊聞當四月後三司開封府等處應有收坐干連人合行追勘公事及寄杖人多是用情拖延等候疏決深成敝幸欲乞指揮今後才人三月應有合行結絶公事嚴緊催促了當仍令當職官員躬親檢舉庶絶姦弊論內降臣訪聞軍巡院見勘周景為於慶厯五年二月係內東門手分發意同胡可觀與雜買務同情盜用羅帛等入巳事發其雜買務監專並該決配內用景為首合得絞胡可觀為從流配千里外牢城其用景避罪逃走三司尋具申奏乞不原赦減降至三年三月內捉獲奉聖旨決脊杖十七配黃州牢城為患未決本州不詳前來指揮却原赦減降決臀杖十七為患未區分昨駕船上京遂告囑造軍器及北作坊手分等指射充本坊皮匠近押赴省司斷先寄仗數遇夜未決依前逃走尋巳捉獲竊聞奉傳宣劄子令免徒罪只配比作坊工匠緣周景原情至重減死巳優若更免刑深屬長惡况可觀為從尚該徒配豈可為首之人却全免罪刑罰一濫則狡吏得以為姦無所畏懼欲乞聖慈特降指揮下三司子細根勘依元降徒罪更不令充工匠改配逺地州軍牢城收管所貴頑猾之輩不能幸免請重斷張可久臣等伏見僉書武信軍節度判官廳公事吳奎奏勘前淮南轉運按察使司勳即中張可久招伏不合在任日於部下興販私鹽一萬餘斤等情罪案下大理寺竊慮本寺引用應犯違禁等物並以見捉獲斤兩條貫定斷今張可久販私鹽巳經賣過别無見在議罪必輕况前件條貫本為細民所投按張可久本庸鄙之資濫按察之任為朝廷之倚重乃一方之表帥而巧圖財利冒犯禁憲雖前後職司臣僚或有以贓濫獲罪然未有如可久之甚者此而可恕孰不可容其張可久乞不原近降疏決特於法外重行逺地編管以勵將來仍乞今後應臣僚等或犯興販諸般違禁等物者不以見在或廢用並以元犯斤石罪名定斷其諸色人等所犯即依舊條施行所貴貪猥之輩稍知警懼乞斷向綬第一章臣竊聞太常博士傅瑩近滄州制勘回向綬準前變變一行干繫九十餘人依舊收禁竊緣向綬翻變前後三四次况證驗分明絶無疑慮原情至重坐死猶輕若候具案定罪必致淹延月日干連人等盛暑之際枉被禁繫實可傷憫其向綬欲望只據纍次勘到罪狀特行重斷俾幽寃得伸狡吏知懼第二章臣近者上言以向綬恐迫通判太常博士江中立自縊身死纍次勘鞫拒抗翻變只乞據前後勘到情欵定斷尋於滄州取到案卷送下法寺至今多日切恐有司執守常制引用律文未得允當况向綬本意怒中立欲擲發所為不公事件遂抑勒諸色人等誣罔陳首中立罪犯今制勘所又巳一一辨明假中立所犯有狀自有朝廷之法向綬何得輒用威勢凌迫一至於是中外無不憤惋若不特行誅竄則今後長吏恣為不法同官僚屬稍有言議即便行捃拾置於非所或迫令自盡或煆成重罪必無由理雪所繫事體甚大欲望聖慈特於法外重賜裁斷以警戒將來請法外斷魏兼臣訪聞勘到前淮南轉運使工部郎中魏兼以先在任日於部內置買物業并剩量過職田斛斗等罪犯奏案巳下法寺詳斷魏兼蚤踐周行荐叨煩使專總察之任在表率之地固當正身蒞下竭節奉公而乃不顧朝章自為非法竊慮疏決在近乞不從原減之例臣伏見先朝以崔端知華州日于部下創置物産事發被劾先帝置之散秩擯棄終身其魏兼伏望聖慈特出宸斷法外重行以警貪猥請贓吏該恩未得敘用臣竊聞太宗朝臣僚或犯贓罪並配少府監𨽻役及該赦宥謂近臣曰此既犯贓汚只可放令遂便不可復以官爵其責貪殘慎名器也如此且兩漢以贓私致罪者尚禁錮子孫矧自犯之乎今明堂大赦應係貶降臣僚例該録用若張可久先任淮南轉運使日以自販私鹽剩收職田黜削纍經敘用巳任蔡州節度副使見監陳州糧料今來不可更復正官欲望且與散官量移差遣其餘應以贓濫致罪者乞不一例録用所貴贓吏稍知警懼包孝肅奏議集卷四
