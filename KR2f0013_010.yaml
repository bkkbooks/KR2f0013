body:
  text: 包孝肅奏議集巻十宋包拯撰糧道奉詔河北計置斛斗日上殿臣竊見河北闕糧州軍例皆屯泊軍馬不少雖朝廷多方計置糧儲應副縁支多收少夏秋二税又無准望若不别作擘畫必恐向去大叚闕食且河北天下之根本士卒絶糧勢必生變伏望聖慈詳審事機且将闕糧州軍土客兵士各隨近便去處量與移屯河東或近南有備州軍就糧供贍緩急應用必不誤事候将來計置稍備漸令復舊但慮議者以防邊兵士不可輕動况北人方守盟約雖有西討之名嵗月之間必未有釁若軍無餱糧萬一腹心自相擾亂為患益甚則國家之憂在此不在彼必然之事不可不深慮也請支撥汴河糧綱往河北臣奉勑差往河北提舉計置斛斗縁河北轉運司近年失於計置自災傷之後近裏州軍例皆闕乏糧儲有只支得一兩月去處雖本司於去年秋擘畫預給三説文鈔配糴三百五十萬自後又為安撫司以配糴不便乃借支諸州常平倉及那撥封樁斛斗外只令糴三十一萬石為一年准備其斛斗又並未般到闕糧州軍虚作見管數目不過夏初漸已支盡勘㑹三司先於别州支撥斛斗應副内汴河綱四十八萬石見在河陽積貯及於京西支撥二十九萬石各巳差官裝發往衛州通利軍下卸兩月有餘方起發得十七八萬石其京東三十五萬石令轉海往滄州雖聞和雇客船一運只裝載得三萬餘石一年可發得兩運亦未見報起發次第近准中書劄子令更配糴一百萬石充軍糧况河北河東水旱相繼人戸流亡殆盡雖有存者亦宜撫卹不可重有搔擾雖欲抑配必恐無由辦集臣自受命以來夙夕疚懐縁河北軍糧支用浩瀚毎月約支五十萬石一年約支七百萬石或緩急添屯軍馬所費轉多今來若不自京師及早急速計置往彼秋初必致闕誤至時卒難擘畫應副河北腹心之地糧食稍絶必有他變為患不細近聞江淮發運司今春頭運並是和雇客船非乂到岸當此水勢調匀之際兼人船完備乞令三司相度便添錢和雇那撥斛斗二百萬石往衛州或通利軍下卸即不可更候第二運盖五六月後水勢浩大官船必不能前去且捄濟河北惟有此路捨是則無以為計若稍更遲疑即不及矣伏望陛下早賜指揮三司施行請於懐衛糴米修御河船運臣竊見御河上自懐衛通利軍下至沿邊州軍順流般運斛斗無便於此即目綱船大小只及三四百隻兼多是損壊者北京雖有造船場縁累年巳來官司下切㸃檢兵士物料等並是将别處支用日近方鳩集工匠打造又難得材植欲乞特降指揮下河北都轉運司選差知次第幹事官員於鎮府界西山採斫木植作栰前來令本司更於諸處盡底剗刷工匠差官專監併手造船及添修損壊者旋支往本河輦運况懐衛州素號沃壤斛斗至賤可以計置應副沿邊州軍只患無船若得船三二千隻舳艫往來銜尾不絶即邊儲無匱乏之虞兼免貴價入便枉費官錢請河北及時計置斛斗臣竊見河北今夏二麥大熟近朝廷支撥見錢及本路應係諸般封樁錢等並令收糴共及一百萬石逐路糧食雖及年支亦須接續計置兼沿邊便糴以三説新法全未有客人入中巳具事由聞奏乞令沿邊且用見錢交鈔入中一二年至今未降指揮今秋田苗甚好将來必是豐稔若不預為擘畫必臨時措置不及况積蓄軍儲無便於此時不可失也訪聞邊郡甚欲得銀絹等博糴或朝廷以三説新仃不欲改法即望聖慈特許於内庫支借銀絹一百萬疋兩令轉運司分配與沿邊州軍依見錢價例收糴諸色斛斗不惟邊儲有備兼免貴價入便大支却在京錢物等事體至便請添河北入中糧草臣伏讀前漢趙充國傳充國嘗謂大司農耿壽昌曰於金城湟中糴榖三百萬斛羌人不敢動矣壽昌請糴百萬斛迺得四十萬一失此冊羌人故為逆失之毫釐差之千里事既然矣若四夷猝有動揺相因而起雖有智者不能善其後也是知糧儲有備則邊患不足恤矣臣竊見河北沿邊州郡軍糧未備屯兵少處約及二年如定州屯兵稍衆只及一年有餘况中山最是控扼之所若非次添屯軍馬不支數月緩急如何取濟雖朝廷財用窘迫力所未及然河朔根本之地自强敵講好觀釁而動詭詐萬狀固不可信其虚聲怠其實備孫子曰無恃其不來恃吾有以待之也無恃其不攻恃吾之不可攻也今若計度糧草處置邊事且循舊制不務施為臣恐日甚一日有不可捄之患矣故曰金城湯池帶甲百萬非粟不能守可不熟慮乎欲望聖慈特降指揮令三司應河北沿邊州軍且令依舊入中若以倍費官錢即乞支撥見錢百萬貫趁今夏二麥豐熟之際於近便處及時收糴却自御河輦運往沿邊州軍以實儲廪比之貴價入中其利甚厚仍乞速賜指揮施行求退求外任第一章臣以極陋至庸之質過叨甄擢猥參近侍仍預諫職才㣲責重何以云補伏惟陛下以英睿之徳兼夷曠之度詢求讜議容納愚直此誠臣百千載之一遇也然以位疎言賤罕或施行上則負陛下求治之心下則忤執政用之之意且忠良介特之士在下既不能進奸猾苛暴之人居職又不能退公議日迫無以逃責久兹忝冒實不皇寧伏望陛下憫以無他矜乎不逮寛其罪戾賜以保全俾出領於單麾庶少圖於薄效臣欲乞江浙一次知州任使臣無任懇願激切之至第二章臣近者上殿曽具劄子進呈乞江浙一次知州任使至今未奉指揮進退悚懼啓處不寧竊念臣識闇材駑任優責重於國家之大事無可濟於朝廷之庶務不能周獻替既無所聞論議又不足信冒榮滋久􅌤顔不皇退揣至庸願全素守伏望陛下曲回聖造俯諒愚𠂻特與保全俾從外任誓圖報效靡憚捐糜臣無任祈恩竢命激切屏營之至第三章臣生於草茅蚤從宦學盡信前書之載竊慕古人之為知事君行巳之方有竭忠死義之分確然素守期以勉循而况親逢盛辰驟被殊用寘諸侍從之列擢處諫諍之班臣於此時敢忘圖報至於朝廷之政或闕國家之計所先爵寵非賢權幸干進臣嘗披􅅹肝膽冒犯威顔寔忌諱之不知曷怨仇之足避濫當所職既竭乃心然才無所長愚有不逮雖間形於狂瞽徒仰紊於睿聦止成塞責之虚名詎見已行之實效犬馬之賤豈憚溝壑之棄捐塵露之徴無禆山海之髙大上則孤聖君之盛選下乃迫多士之公言勢難茍安理宜知退向者屢陳封削未賜允俞尚出入於軒闈毎慙羞於面目伏望皇帝陛下察臣愚直匪為身謀憫臣孱㣲所憂任重從其危懇委以外藩獻替之司庶免妨賢之咎循良之寄誓堅盡瘁之誠干觸冕旒臣無任祈恩竢命懇迫激切屏營之至第四章臣近曽陳乞外任差遣䝉降中書劄子奉聖㫖令依舊供職者伏念臣立朝孤直荷聖奨知每竭肺肝勉圖報塞雖夙夜匪懈務進於瞽言而嵗月逾深訖無於善狀臣當堅辭所職退避能賢思之甚詳志方不奪伏望皇帝陛下察臣危迫惠此頑㝠特霈俞音俾分便郡茍全要領幸出於回容誓竭糜捐終酬於覆載臣無任祈恩竢命激切屏營之至第五章臣近者累次陳乞外任差遣䝉降中書劄子奉聖㫖令依舊供職尋再具狀陳乞未䝉指揮施行伏念臣夙以愚直無所云補久汙髙明之地彌負素餐之責願避賢路庶塞公議伏望陛下矜其拙訥賜以保全俾領郡麾少圖㳙效臣無任懇悃竢命之至第六章臣前後六次具狀并劄子陳乞外任差遣近又准中書劄子奉聖㫖以臣到院未及二年依天禧元年新降詔書令依舊供職者臣迹孤望輕才短責重上不能廣聖主之徳下不及捄當時之弊若乃不愧屋漏罔恤人言雖茍逭於邦刑恐難逃於隂譴伏望皇帝陛下察其審分鑒此由𠂻特推從欲之恩免罹非據之咎冒瀆宸聴臣無任激切屏營之至第七章臣近以起居舎人吳奎差知宻州曽具論列未賜施行進退憂惶罔知攸措伏念臣孤危之迹多仇少與待罪諫列垂及二年竟不能有所建明少禆萬一而陛下聖度淵深終賜保全雖明主之恩不忍輕去在愚臣之分固難自處伏望聖慈指揮檢會臣前後累次陳乞外任差遣因依許除江浙一便郡誓殫薄效上荅鴻恩臣無任懇迫竢命之至包孝肅奏議集巻十
