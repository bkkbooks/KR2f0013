body:
  text: 包孝肅奏議詔令奏議𩔖二奏議之屬提要臣等謹按包孝肅奏議十巻宋包拯撰拯字希仁廬州合肥人天聖五年進士厯官御史中丞知開封府終禮部侍郎樞密副使贈禮部尚書諡孝肅事迹具宋史本傳案宋志載拯奏議十五巻今此本為拯門人張田所編自應詔至求退分三十門止有十巻田序亦稱十巻與史志不同然宋志顛倒悖謬為自來史家所未有不可援以為據殆誤衍五字歟惟是田所編次多不可曉文獻通考引汪應辰序曰公奏議分門編𩔖其事之首尾時之先後不可考也如請那移河北兵馬凡三章其二在八巻議兵門其一乃在九巻議邉門其不相貫穿如此所言與此本相符序又云今考其嵗月繫于每章之下而記其履厯於後若其嵗月見於章中與夫不可得而考者不容以不闕也庶讀者尚可以尋其大槩是應辰于是編固每編皆為箋註而此本無之盖應辰箋註久佚今存者仍原本耳序又云如劾罷張方平宋祁三司使而奏議不載豈包氏子孫所不欲以示人者耶案史稱拯攻去張方平宋祁朝廷遂以拯代祁為三司使歐陽修有蹊田奪牛之奏拯家居避命者久之應辰所云盖指此事然拯之剛正豈逐人而覬其位者脩雖有此奏特宋人好為議論之習拯之心跡天下後世皆可諒之遽諱而削其稿反若拯實有此短者此張田編次之無識非拯志也張田字公載澶州人嘉祐中嘗知廬州甚著清譽盖能不愧其師者此書第九巻中有進張田邊説七篇狀併附以賜張田勅書與他篇例異知確為田之所編應辰以為其子孫諱之非其實矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書史部六包孝肅奏議集目録詔令奏議𩔖二奏議之屬巻第一應詔一篇仁宗皇帝開天章閣親製䇿問致君九篇請建太子進魏鄭公三疏七事論委任大臣論大臣形迹事謹天戒論赦恩不及下上殿劄子論冗官財用等巻第二任相一篇晏殊罷相後上言災異三篇論日食論地震論星變明體一篇論臺官言事明禮二篇論百官致仕請兩制官祀九宫貴神戒漸一篇論内臣事慎命令一篇論詔令數改易論功一篇請謚王明論賞一篇論李用和捉獲張海乞依賞格酬奨慎差除一篇請復封駮選舉四篇論取士請先用舉到官請依舊封彌謄録考試舉人請依舊考試奏䕃子弟巻第三擇官二十四篇請選諫議大夫請復御史裏行請選用提轉長吏等請令審官院以黜陟狀定差遣先後請選河北知州請選廣南知州請選利州路轉運使再請選轉運提刑請置發運判官請召還孫甫張瓌請復韓贄等臺官論河北帥臣二章請除范祥陜西轉運副使再舉范祥請録用楊紘等請選人知䖍州請選差河北令録請廣南添差職官乞不用贓吏乞不遣楊景宗知磁州請選内外計臣二章省官二篇請罷廵驛内官乞罷河北提舉修造軍器使臣巻第四去刻薄一篇請不用苛虐之人充監司抑僥倖七篇請絶内降論明堂覃恩請令江淮發運滿任論先舉三路知縣不得令監當論縣令輕授奏許懐徳上殿陳乞應修造使臣乞依宣命不得乞轉官慎刑一篇請令提刑親案罪人正刑八篇乞斷韋貴請重坐舉邊吏者論疎决論内降請重斷張可久乞斷向綬請法外斷魏兼請贓吏該恩未得叙用巻第五明禁六篇請差京東安撫請速除京東盗賊請斷銷金等事請開封府司録左右軍廵官屬不得請謁并追贓事請止絶三畨取索請罷天下回易等去妖妄三篇論妖人冷清等事請安置鹿皮道者巻第六按劾二十五篇彈宋庠再彈張堯佐三章并中書劄子二道論李昭亮二章論丁度孫甫事乞辨明彈郭承祐二章彈李淑二章彈張若谷彈王逵七章請勘閻士良請罷知雄州劉兼濟論李綬冐國親事請追任弁官論閻士良轉官請罷王渙𣙜貨務辨理一篇請留吳奎依舊供職巻第七民事二篇論歴代并本朝户口直勾衙前請限二年一替寛恤二十五篇請差災傷路分安撫再請差京東安撫請罷天下科率請免江淮兩淛折變四章請免陳州添折見錢請救濟江淮饑民請支義倉米賑給百姓論江西和買絹論放欠請權罷陜西州軍科率請将邢洛州牧馬地給與人戸依舊耕佃二章請放髙陽一路欠負請免㳂邊人户折變請接送北使三畨請修商湖口請出内庫錢帛往逐路糴糧草領陜西漕日上殿乞開落登州冶户姓名請罷同州韓城縣鐵冶務人户論􅌡州公用請罷里正只差衙前巻第八戒興作一篇請不修上清宫興利一篇請修蔡河堰并斗門言財利四篇論茶法二章言陜西鹽法二章議兵七篇請留禁軍不差出招置土兵請那移河北兵馬事一章論宣毅軍請移冀州就糧兵士歸本州請移冀博深三州兵馬請移配河北作過兵士往向南州軍巻第九議邊十五篇進張田邊說狀賜張田勅書附論邊将二章請選雄州官吏論契丹事宜三章論昊賊事宜論楊守素論保州事乞河北添糴糧草再請移那河北兵馬及罷公用囬易請擇探候人論蠻事二章巻第十糧道五篇奉詔河北計置斛斗日上殿請撥支汴河糧綱往河北請於懐衞修御河船運請河北及時計置斛斗請添河北入中糧草求退七篇求外任包孝肅奏議集題辭仁宗皇帝臨御天下四十年不自有其聖神明智之資善容正人延讜議使其謀行忠入有補於國卒大任以股肱者惟孝肅包公止爾或曰先朝任諫官御史多矣不四三年歘至侍從近列然𩔖弗遂大用又多不得善名以去獨孝肅之進終無他吝而天下不得異議者何哉曰包公一舉甲科拜八品京官令大邑當是時同中第者雖下流庸人猶數日月以望貴仕公拂衣去養十年亡宦意其心無他止知孝於親而為得也已而還朝天子噐其才髙行潔處之當路公上裨帝闕下瘳民病中塞國蠧一本於大中至正之道極乎是必乎聽而後巳其心亦無他止知忠於君而為得也他人或才不勝任望不厭人方且死黨背公挾憾復怨如鷙得搏若虺肆毒顛墜於憔顇泯滅之地以甘其心此衆所以多不得善名以去公進無他吝而天下不得異議也初公之歸養也至畢親䘮方復仕嘗有詩云秀榦終成棟精鋼不作鈎卒踐其言而得大位美矣雖然愚謂非㑹仁宗皇帝至明上聖有不可惑之聰公欲必行其道於時難矣乎孔子有言邦有道危言危行坤之六二亦曰直方大不習无不利此公所以逄辰也公薨後三年田守廬州盡得公生平諫草於其嗣子太祝君因取其大者列三十門凡一百七十一篇為十巻恭題曰孝肅包公奏議集遂納諸家廟庶與其後嗣無窮也公之事業始卒官閥遷拜有國史與天下公論在此不敢輙書云張田題
