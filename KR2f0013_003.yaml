body:
  text: 包孝肅奏議集巻三宋包拯撰擇官請選諫議大夫臣謹按唐六典隋氏門下省置諫議大夫從四品下龍朔中改為正諫大夫開元初復舊凡置四人掌侍從䂓諫仗下後言朝政得失故其秩峻其任重歴代以至祖宗朝未嘗輕授近嵗殊不選擇但以年叙遷如慎鏞等輩昬瞶不才皆踐此職是以朝廷名器容易假人紊黷典常莫斯之甚臣欲乞令後應少卿少監等該磨勘改官如曽經職司委是素有才望為衆所推者方得轉諫議大夫其餘不得徇人止授以大卿監所貴官無濫進流品益清請復御史裏行臣謹按唐制御史府其屬三十人所以重風憲之職國朝以來選任尤劇天禧中御史六員盖朝廷紀綱之地為帝王耳目之司必在得人方為稱職自非端勁特立之士不當輕授近嵗知雜中丞不專奏辟或命兩省臣僚參舉而條制約束罕得應詔雖素有才望又限以資考推擇之際頗慎其選臣竊見頃年添置御史裏行二員縁所舉之人秩序差淺用之不次必無畏避自後因循而罷物議惜之方今臺官員數最少抨彈之任所繫尤重欲乞令中丞知雜依舊例於陞朝親民官内保奏堪充御史裏行二員如稍不稱職並嚴坐所知請選用提轉長吏官臣聞王者之總治天下也内則宰臣百執事外則按察之官刺史縣令而已若中外各得其人協心以濟則陛下垂拱仰成無為無事矣夫轉運使提㸃刑獄在乎察官吏之能否辯獄訟之寃濫以至生民利病財賦出入莫不蒞焉事權至重責任尤劇茍非其人則一路受敝如州縣之職不舉按察之吏壅不以聞則朝廷無繇而知是一方之民有終無告者矣昔漢宣帝曰與我共理天下者其惟良二千石乎盖刺史縣令耳目接於民事政令所出慘舒攸繫今朝廷既巳輕授又數數更易其才者雖有育民濟治之具亦烏所施設哉又况庸庸者乎今粗舉一二條陳如左竊見近日除授轉運使但理資序不甚選擇如江西路劉緯利州路李熈輔皆智識庸昧衆所共知其提㸃刑獄亦未甚得人若廣西潘師旦江東令狐挺京西張士安河平席平皆素非幹敏之才又無亷潔之譽猥當是選宜乎不任其職雖近例並委兩制奏舉然所舉之人或才有合格以㣲文不用故不才者往往進焉乃是訶其細而忽其大恐非任才之意也欲乞今後應除轉運使先望實而後資考則所得精矣凡舉提刑若保薦之人不協公議即乞責其謬舉别委他官如此則可絶徇私之請矣刺史縣令前後條約非不丁寧其中濫進者亦衆如曹琰自通判便授閏州大郡果非理决人至死又聞韓松知鼎州縁本州控接蠻界居嘗屯治軍馬舊係武臣知州後乞選差文資况韓松累任以不治聞豈可當此邊任乎欲乞今後應差知州並令有司精覈治伏審驗人才以州郡繁簡要僻差而授之庶幾不致敗事所有奏舉縣令即令流内銓選注繁劇不治之邑是則民瘼少蘇而和氣可召矣伏望聖慈申命宰府舉而行之則天下幸甚請令審官院以黜陟狀定差遣先後臣竊見審官院差京朝官並循舊例以到院先後為限未嘗較辨賢否論次殿最清濁一溷流品不分但以名次補闕而巳甚非委重近臣審擇之意况國家設提刑按察之職察羣吏亷穢之狀其治績尤著者則必慰薦稱舉貪懦不治者則必體量按劾别白善惡悉以上聞而審官院署名于籍以為沮勸之本今則不然當除擬之時但以月日次第差而授之則向來黜陟之狀委而不顧乃同虛設豈不惜哉且黎元之命繫於長吏今郡守縣令鮮或得人盗賊間起生民重困天下受敝職此之繇可不慎哉臣欲乞今後審官院應京朝官初任即令勘㑹在任有舉主五人無私罪者陞為上有舉主三人以下或無舉主及私罪者以為次其有私罪及體量者降為下等差授以為定制如此則進者知勸退者知懼旌别淑慝無失於此請選河北知州臣送伴北使往回竊見河北當路州軍各係近邊控扼之地所有知州等並是朝廷一一精選蓋欲謹邊防訓士卒以為急務今則不然但能増置厨傳迎送使人及曲奉過客便為稱職則美譽日聞若稍異於此則謗議紛然往往因此降黜者有之縁每年非次人使往來動經七八箇月逐處預為准備不敢少懈况三嵗兩度非次人使乃是一年之内迎送絶無虚日又何暇路謀訓練哉兼訪聞北人日夕㸃集兵馬添創營寨但以西討為名然契丹之心殊不可測議者雖云盟誓堅固萬無負徳且安不忘危利或生害又况巳然之兆不可不預為之備也臣觀一路武臣未甚得人但售進市恩結挾弭謗爾一旦急用必無成功加以邊備未完邊廩未實茍有騷動将何取濟此朝廷所宜深慮也臣欲乞今後應縁邊及當路知州部署鈐害駐泊等並武臣中不以官位髙下但選擢有武藝将材可用者任之專責以守備撫馭之術如有實効不可以浮議數有移替俾軍民安其政令緩急不至敗事如允臣所奏即乞特賜指揮請選廣南知州臣竊見廣南應係知州例差奏䕃京朝官初任知縣及一考者伏况世禄之胄鮮惇義敎童孺之嵗便忝仕籍未嘗學政即使司民甫越朞年又移典郡且一邑之事尚未練悉六條之重安可責成地雖逺僻不可輕授方國家多務調率旁午逺民困重尤在得人臣前任端州日具知其事或無職官處只是知州獨貟管勾其猥冗恣横之輩則惟務誅求庸懦懵昧者又全不曉事民罹其害無所訴告提刑轉運使憚其逺惡復不能巡歴按劾但上下相䝉耳臣欲乞今後奏䕃京朝官合該廣南知州者並於次任知縣内選有治績及舉主者方得差移并乞勘㑹元無職官處各選置一員仍令轉運提刑司非時不得差出所貴闗掌郡事輯寧異俗請選利州路轉運使臣伏見中書劄子知巴州楊佐奏昨體量得巡撿頓士寧為事過當非理打罵兵士州司取勘及提刑轉運使巡歴到州問頓士寧有何不協只一靣按問所劾官况頓士寧與李熈輔有舊恩作本司採擇施行若頓士寧指論臣詔法何以遵守又見本路提刑司奏巴州見禁巡撿頓士寧并兵士等及轉運使李熈輔到彼審問據頓士寧口稱屈抑及分析知其不公事一面行遣差官往彼推勘及差利州通判李世隆往巴州權交替知州楊佐赴置院照勘奉聖㫖令提刑司選清强官依公盡理取勘施行竊縁楊佐見為長吏部下官屬既有不公理合體量按問今李熈輔乃憑信頓士寧分析一面差官往彼交替楊佐赴推院照勘顯是熈輔與士寧有舊挾私任性不遵詔勑若令舉劾之妄被誣構便下所司與人對勘則今後部下官屬有過長吏顧避不敢按問乃是廢格詔勑而容長姦惡此尤事體不可之甚也兼熈輔不才庸謬衆所共知臣先曽論列未賜施行况利州一路累經災傷人民凋敝全藉按察之官綏撫鎮靖其熈輔所為如此豈宜久居是職必恐別生事端欲望朝廷選差亷敏才識之士充本路轉運以安逺民如楊佐顯有贓私罪犯即令本路提刑司體量確實事狀聞奏依條施行再請選轉運提刑臣伏見諸路轉運使并提㸃刑獄自來朝廷凡有差除皆以資序叙遷或用臣僚薦舉間容濫竽未甚得人致一方之民必受其害如李熈輔張經等居按察之任當一路之重不能遵守詔勑振舉職業而挾私逞憾無所畏憚妄構刑獄恣行追攝雖已衝替未足懲戒各乞重行黜降以警将來所有宣州廖詢秀州邊瑀不公事跡中外傳聞昨因安撫奏劾方此彰露而本路提轉殊失按舉居職不稱合正朝典臣欲望聖慈應今後差轉運使提㸃刑獄臣僚並請選素有才能公直亷明之人充職不以資序深淺為限則逐路得人而官吏有所凛畏矣請置發運判官臣竊以京師衆大之都屯兵數十萬財用儲廪皆仰給於東南主是任者制置發運使最為今之劇職固不可輕以授人况朝廷參用兩制假以事權委付之重不謂不至伏見發運使許元先自判官凡蒞職八年東南利害無不周悉所以嵗運不乏者盖久任得人之明效也縁施昌言許元績用頗著切慮别有進擢則後來雖有才者必恐未能究財用出入之敝則無繇辨集臣欲乞依許元例令置判官一員於朝臣内選差素有公望幹才者充如前久任所以稔熟其事嗣守成䂓或昌言等緩急替移免致敗事請召還孫甫張環臣近䝉聖恩擢預諫職固讓則有嫌疑之端輕授則有忝冐之媿進退失措罔知寧處伏况諫議之才方今極選用人之得失繫國之輕重固不可不慎也臣竊見起居舎人祕閣校理孫甫兵部員外郎祕閣校理張環禀純一之性有端方之節危言篤論可以正闕遺博學逺識可以備顧問欲乞特與召還寘之近列則言路益廣公議允協請復韓贄等臺官臣竊見祠部員外郎韓贄屯田員外郎孫抗太常博士閻詢等才識明茂資質純正先任御史各以㣲累黜免多歴年所屢經恩宥勘㑹前來所坐原情且非大故棄瑕亦合録用况御史臺闕官甚衆奏舉罕得其人如贄等求之方今實為精選臣以謂可復舊職必允清議伏望聖慈特召還臺或不如所舉臣甘當同罪論河北帥臣第一章臣伏見河北自商胡决溢之後連嵗水旱倉廪匱乏調度不足朝廷一切應副廣有餘年之蓄而流亡未盡復田畝未盡闢諸州長吏尤在得人其間茍且之輩但幹尋常事務趨過目前其經乆利害茍不及其身率皆不為前後相承積弊巳極至帥臣亦未甚精選或有不樂乆任者乞後闕第二章臣伏見河北自商胡决溢之後連嵗水旱倉廩匱乏可不深思逺慮而忽天戒也臣近上言以河朔連嵗災傷公私匱乏帥臣長吏尤在得人其有不願乆任者乞於中外臣僚中推擇諳知彼中事宜敢任大責者專委付之俾綏拊疲民經畫逺圖庶幾後患可弭且河朔之於京畿猶心腹之與背膂義同一體休戚均之今災異如是豈可坐視其敝恬然以為無事但欲因循憚於更張措置可乎臣實懼焉惟陛下留神省察以河北事體至大帥臣等可用可罷速賜神斷天下幸甚請除范祥陜西轉運使臣伏見近降勑命陜西鹽法且依范祥擘畫通商放行此誠國家大利便也而中外臣僚不詳本末時有横議所賴朝廷特與主張兼范祥見充本路提㸃刑獄與轉運司每常公事往來或至違異必恐不能協心以濟深屬不便欲望聖慈特許就除范祥權本路轉運副使只理提㸃刑獄資序所貴擘畫鹽法利害計置沿邊斛斗事歸一局易為辦集再舉范祥臣先自陜西相度鹽法回曽具劄子乞除提㸃刑獄范祥權本路轉運副使所貴擘畫鹽法利害計置沿邊斛斗事歸一局易為辦集至今未䝉施行勘㑹范祥新法自皇祐元年正月至二年十二月終共收到見錢二百八十九萬一千貫有零比較舊法二年計増錢五十一萬六千貫有零三年春季又巳收到見錢七十餘萬貫兼糴到斛斗萬數不少縁陜西累嵗豐熟今秋又大稔正當計置之際况范祥顯著成効可備驅䇿欲望聖慈允臣前奏特許就除范祥本路轉運副使責其久任俾之一面制置解鹽及将見錢收糴糧斛須管沿邊軍儲大叚有備又免向云入中枉費𣙜貨務見錢經乆之利無便於此請録用楊紘等臣讀先朝實録大中祥符中并益二州嵗久當代先帝偏閱侍從官姓名謂輔臣曰此等各有所長然求其文雅適用可委方面者鮮矣每念有唐名賢比肩而出何當時得人之多也王旦等曰方今下位豈無才俊或恐拔擢未至爾然觀前代求賢不求其備不以小疪掩其大徳今兹立朝之士誰為無過陛下每務保庇之然流言稍多則亦梗於任使大都迭相稱譽近乎黨紏過訐非近乎公鑒闕愛憎唯託上聖誠哉是言至切至當縁近世之患正在於此以四海之廣不患無賢而患在信用之不至爾且頃嵗以來凡有才名之士必遭險薄之輩假以他事中傷殆乎屏棄卒不得用議者迄今痛惜之欲望聖慈申命宰執應臣僚素有才行先以非辜被譴如楊紘王鼎王綽等雖曽叙用未復職任者並乞復與甄擢或委之繁劇必有成効如是則風化日益美賢傑日益聳積之以乆和氣洽乎上下矣請選人知䖍州臣伏見䖍州據江表上游南控嶺徼兵民財賦素號重地累嵗賊盗充斥如𩔖行者結集匪黨大為民害近方稍息今聞南雄傜賊唐才闕等所至驚擾殺害官吏况封境與本州接連最是控扼之所全頼才幹長吏以之綏輯備禦昨朝廷特差余靖近復丁憂欲望聖慈特降指揮令審官院選差有方略强明臣僚往彼知州庶一方之民得獲便安請選差河北令録臣勘㑹本路州軍令録判司簿尉等年老及懦弱不曉民事者甚多見不住體量行遣次右具如前切縁本路乆經災傷流亡稍復而科率不能盡絶凋敝益甚州縣之職尤在得人欲乞當司體量得前件官内如有委實年老及謬懦不曉民故雖無贓私罪犯彰露許令於部下奏舉資序合入之人充替仍乞特降指揮流内銓今後應除注本路縣令並以奏舉人充判司簿尉亦乞選差所貴疲困之民得其存恤請廣南添差職官第一章臣先曽上言廣南東西兩路諸州元無職官處各令置一員闗掌郡事尋䝉降指揮下銓司至今未聞有人注擬雖該赦恩放選又例注家便及次逺以嶺外遐僻憚其地逺兼訪聞兩路闕額甚多其十數年無正官處並差土人充攝官縁近年蠻賊侵撓民力困竭全藉亷幹官吏多方綏撫今來銓司祇候合入逺選人及情願者竊恐卒未差除得人深屬不便竊見頃年以來廣南闕官遂於江浙就移兩任四考巳上簿尉充彼處縣令自後因循不行欲乞特降指揮令銓司檢詳舊例於江浙荆湖等處近廣路分諸州簿尉中選無公私罪犯兩任五考巳上就除權職官四考巳上就除縣令便令赴任如此則闕官無由倖免異俗得以輯寧第二章臣昨上言以廣南諸州乞今後應奏䕃京朝官合該往彼知州並於次任知縣内選有治迹乃舉主者方得差移并乞勘㑹東西兩路元無職官處各選置一員至今多日未䝉朝廷施行竊縁嶺服之表地最遐僻俗性獷悍易動難安今又蠻賊猖狂郡縣搔撓長吏之任尤在得人况童孺之年未嘗學政不當輕授重困逺民且近地牧守尚有通判職官更相禆贊而嶺外逺郡乃令此輩獨員管勾民罹其害無所控告甚非朝廷求治之本意也兼訪聞所闕職官祗二十餘州每州各置一員事理至便俾資闗掌郡務以安異俗伏望聖慈令檢㑹臣先進劄子速賜施行乞不用贓吏臣聞亷者民之表也貪者民之賊也今天下郡縣至廣官吏至衆而贓汚擿發無日無之洎具案既上或横貸以全其生或推恩以除其釁雖有重律只同空文貪猥之徒殊無畏憚昔兩漢以贓私致罪者皆禁錮子孫矧自犯之乎太宗朝嘗有臣僚數軰犯罪並配少府監𨽻役及該赦宥謂近臣曰此輩既犯贓濫只可放令遂便不可復以官爵其責貪殘慎名器如此皆先朝令典固可遵行欲乞今後應臣僚犯贓抵罪不從輕貸並依條施行縱遇大赦更不録用或所犯若輕者只得授副使上佐如此則亷吏知所勸貪夫知所懼矣乞不遣楊景宗知磁州臣竊聞觀察使楊景宗知磁州物議喧然以為不可按景宗累經外任並皆不了昨自鄆州亦以所為恣横非次召還縁禀性不常用刑過當今若委之為郡以親民政不惟一州生靈枉被殘害或慮不公事發須依法施行恐非所以保全戚属之道也其景宗欲望且令依舊與在京差遣事體至便請選内外計臣第一章臣竊見天下財用積年窘乏近自明堂禮畢賞賚纔罷又行特給支費浩瀚帑藏虚竭且朝廷所仰給者江淮兩浙逐路旱澇相繼兼又茶法隨廢商算不行東南州軍錢帛糧斛自不足用則四方嵗入之數所得幾何今之總邦計者内則三司使外則轉運使當此財用窘乏之際居職者尤宜别求才傑之士俾之興利除害庶幾可濟若乃上下循黙恬然以為無事不務更張措置必恐日甚一日有不可救之患矣伏望聖慈申命有司以今之一嵗出入較近年用度耗登之數則斷可知矣所有内外總計之臣欲乞特出宸斷精加推擇選任能者責以實効庶免将來敗事惟陛下留神省察第二章臣近以天下財用公私窘乏而主使之吏近則三司使外則轉運使乞精加選擢委任能者免致将來敗事兼吳奎陳旭等累曽論列終未䝉施行竊縁三司使張堯佐早縁恩倖驟階華要任至内府委以大計而本職隳廢利權反覆公私困敝中外危懼按歴代后妃之族雖有才者亦未嘗假以事權又况貪庸不才者乎但富貴保全之則無害矣臣伏見本朝自祖宗以來當帑廩豐盈用度充足之際尚乃慎選計臣如陳恕魏羽等輩用之其餘亦盡一時之選况今上下窘迫如是豈可專任此人乆居是職哉失天下之望誤天下之事臣實為陛下痛惜之伏望特出宸斷授堯佐以他職别求才傑之士委而任之責以實効一二年間庶幾可濟不然大懼貽陛下之深憂也且宗社至重財用至急而安危繋焉惟陛下特留聖意臣無任激切懇迫之至省官請罷廵驛内官臣竊見自京至雄州人使館驛專副盡是差鄉民有家産者勾當一年一替仍須是三人巳上方可管勾得前及年終亦多逃避者盖信使往來二畨取給實為煩費雖有條貫約束其諸州乆例為敝難為止絶鄉民不敢伸訴以此蕩盡産業臣仔細詢問縁更有逐處專切提舉館驛家事内臣每一經過捃摭㣲過恣意誅求其費數倍以至親隨吏人藉勢勒索獻遺方可免於刑責臣伏覩諸路館舎各係所管本軍逐時修葺既提舉使臣於上秋間方始出巡居常只憑文字行移州縣依例施行此職誠為虚設有害無利欲乞今後只今本路轉運司逐季指揮轄下州縣應人使經過路分館驛家事等並須管預前一例修飾排辦畢備或更差逐州通判職官先次提舉可不差内臣出外如此則鄉民免於暴歛稍得存濟不至逃亡况接伴使副初離京亦可專委沿路因便查檢必無誤事乞罷河北提舉修造軍器使臣臣竊見河北近年添置提舉修造軍器使臣兩員凡勾當一二年即授閣門祗候替日又得陞擢差遣僥倖恩賞無甚於此况修造軍器逐處自有知州部署統轄都監等逐日逐旬㸃檢按試莫不精專又轉運提刑非次巡歴並開庫一一㸃檢臣近到河朔州軍體問得其提舉使臣只是一年一次略到逐處但取索文字照㑹何益於事及至年終即具數申奏以為己功虚取優賞誠為虚設乞行廢罷包孝肅奏議集巻三
