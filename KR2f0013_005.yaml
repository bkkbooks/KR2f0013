body:
  text: 包孝肅奏議集巻五宋包拯撰明禁六篇請差京東安撫臣聞京東河北兩界州軍見今賊盗充斥并畿内東明襄邑等縣亦有刼賊並未捕獲雖巳選差武臣切恐結集轉多為患不細兼訪聞東路州軍以近年科率差役頻併民力困重不逞之輩因而嘯聚所在竊發况曹兖沂淮陽等州軍山林深逺素號出劇賊之所不可不令即時誅滅也頃嵗京東西軍賊等作過差侍御史仲簡監察御史蔡稟監督捕捉今欲乞選差臺官一員乗傳往逐處體量民間疾苦假以便宜俾之撫綏兼督責州縣所貴官吏效命不敢顧避速得勦除其逐處長吏兵官等稍畏懦者亦乞精擇有方略强幹臣僚對替庶免敗事請速除京東盗賊臣竊見江淮兩浙京東河北累年以來旱澇相繼物價湧貴民食艱阻兩浙一路災疫尤甚雖朝廷寛免租賦優加賑恤而迄今未得蘇息近聞京東濟鄆河北徳博淮南宿亳等州盗賊充斥所在竊發州縣不時擒捕頗甚兇猛盖長吏與巡檢縣尉罕得其人上下䝉蔽不以實聞必恐稔成大患為朝廷深憂不可不速行處置也頃嵗淛東鄂隣淮南王倫京西張海等皆起自倉卒結為巨盗刼害居民郡邑悉不能制禦幸而殱滅無謂邪小蜂蠆有毒且四方藩郡兵伍絶少多者不逾數百輩皆厮役羸卒又驕惰難用寛之則逾慢急之則王禍心不更訓練目不識行陣驅之禦冦必先事而敗雖烏合嘯聚莫能久長而生靈塗炭矣則國家将何道而猝安之况今國用窘急民心危懼凡盗賊若不即時誅滅萬一無賴之輩相應而起胡可止焉伏望陛下督責有司精擇逐路按察之官及諸州長吏有不任職者即令黜罷其巡檢縣尉等並委安撫轉運提㸃刑獄司專切舉察如庸懦不才者速具體量充替應有盗賊不以多少逺近並須捕捉净盡免成後害或少渉弛慢並乞重行朝典請斷銷金等事臣竊見中外臣僚士庶之家衣服首飾之𩔖多用銷金工匠於闤闠之中任意制造殊不畏憚臣伏詳編勑節文除大禮法物外上從中禁下暨庶邦但係衣服裝著之𩔖土木玩用之物並不得以金為飾如違並科違制之罪其元業匠人輙更造作犯者當行處斬此盖真宗皇帝躬行儉徳以化天下故自中禁以及庶邦凡衣服玩用以金為飾者一切禁斷工匠置於極典致數十年間中外絶無犯者而自近年以來時俗相尚銷金之作寖以公行近日尤甚其戚里及臣僚士庶之家衣服首飾並用銷金及生色内間金之𩔖並無避懼盖是匠人等故違條制厚取工錢上下相䝉無敢言者若不速行禁止切慮縻壊金寳扇長澆風競事浮華大損聖化欲乞嚴賜指揮申明舊制上以遵先帝崇儉之意下以絶臣庶好奢之漸請開封府司録左右軍巡官屬不得請謁并追贓事臣昨於八月十七日上殿進呈劄子内一道以開封府司録左右軍廵院刑禁最繁其官屬等但務請謁本局之事罕所究心欲乞今後應司録司本職官員及左右軍巡判官如勘大辟罪人非公事不得出入請謁所貴閱實獄情不至寃濫并一道起請凡諸處勘鞫盗賊公事合追取典賣寄留贓物並須子細根問確實月日件號錢數具牒所屬州縣仍先檢索簿歴照證委無差異即取索典解及收買受寄入等的實因依文狀入案方得追取逐件贓物牒送仍於回牒内一一附録簿歴上月日件號及逐人分析因依文狀以憑照㑹行遣免致抑勒人戸陪備贓物枉䧟平人兼申明先降條貫至今多日未見指揮伏望聖慈特令檢㑹所進劄子施行請絶三番取索臣昨奉勑差送伴契丹人使伏覩三番諸司人依例於接伴使副進發前四五日離京凡經過驛頓並先次取索羊麫鷄鴨魚兎之屬廣設酒肴以待兩番使臣所費物料不少並專副自備供應及至雄州動經旬日本州日供三番下一行使臣等并散直殿侍長行使臣及手分親事官酒食約七十餘分十日之内紐計甚多其餘呼索之物仍不在數况常年兩次國信使自有乆來體例過界月日亦須候接伴使副到雄州方有過界之期兼接伴使副到本處尚住三兩日亦足可祗應臣欲乞特降指揮下國信所今後三番使臣等只得於接伴使副前發一日出行其送伴即先兩日分頓仍只得於當頓排辦祗應如合依衮過驛頓即不得妄有取索互以酒食逓相管設及饋運並乞嚴行止絶兼候送人使過界即令使副前一日回京庶沿路州縣驛頓易為供給稍免搔撓官司請罷天下公用回易等臣竊見天下州軍公用錢自降指揮許令回易之後諸路尤被其苦而河北之害尤甚前後累有臣僚論列乞罷回易雖近降條約罕或遵行縁逐路不以逺近廣令興販並将物貨抑配人戸不惟誅剥細民兼又阻絶商旅以致賣販鹽酒違禁之物無所不為本路鹽酒稅課利逓年以此大叚虧少盖侵奪使然是致用度不足未免重煩朝廷况逐州合破官錢不少若只用管設軍員犒勞賔客自亦有餘但好進之輩圖規厚利交結權幸以為身計爾臣欲乞應係有公用錢處依先降指揮更不得回易其沿邊及人使路分即與量添錢數則公私之利無便於此其互以公用酒食及匹帛之𩔖往來相饋遺者並望嚴賜止絶如敢犯乞坐違制之罪去妖妄論妖人冷清等事二章第一章臣奉勑差與趙槩等録問冷清公事臣尋往軍巡院将公案看詳據冷清欵招伏前後狂言非一原其情狀法所無赦致之極典固在不疑兼詳放停軍人髙繼安欵先因罪犯配鼎州尋却入京託病放免而妄談幻術交結權貴所至之處多以禱祠為名扇惑州縣頃年於潭州即将帶冷清隨行沿路累造妖言知而故縱不以告官及冷清事發則敎令詐作心風果得免罪尋又敎以狂悖之語所不忍聞且都城之内豈可令此輩輕慢憲法惑亂大衆若不速行顯戮以戒未來則啓奸邪之心為國生事防㣲杜漸不可忽也乞令盡法施行第二章臣近以開封府勘到冷清髙繼安等乞早行顯戮免惑中外况狂偽之狀灼然明白决無可疑天地所不容人神所共棄豈宜引用常法遷延不斷此而可忍孰不可恕兼風霾暴作日色無光上下䝉蔽之象故天示此變所以警悟人君如是之至也伏願陛下察變異之來顧宗社之重特出宸斷速令誅夷免奸邪之𩔖别起釁端寖成大患請安置鹿皮道者臣聞善為國者必務去民之蠧則俗阜而財豐若蠧原不除治道從何而興哉竊見興國寺僧鹿皮道者紹宗自殘支體稔懐奸詐扇誘聾俗聚集兇黨創修寺宇鎔鑄佛像糜費貨寳不知紀極方國家多事財用窘急豈容此輩恣行掊刻且佛者覺也在乎方寸假有萬像之廣不出五藴之中但平等慈悲即成正道有為功果非所崇尚昔唐朝欲造大像狄仁傑上疏論列即時罷役伏望皇帝陛下俯矜庶品博採羣議凡所興造速賜禁止其僧紹宗亦乞於外處安置庶免惑衆包孝肅奏議集巻五
