body:
  text: 包孝肅奏議集卷七宋包拯撰民事論厯代并本朝戶口臣近者獲登雲陛親奉德音詢及本朝并唐編戶多少之數臣雖粗陳梗概不足以上對清問退而遍考諸史盡見厯代本末竊以三代雖盛其戶口記籍莫得而詳國史所起惟兩漢最備謹按前漢元始二年人户千二百二十三萬三千及後漢光武兵革漸息之後戶四百二十七萬六百三十永壽二年增至一千六十七萬九百六十此兩漢極盛之數也三國鼎峙干戈日尋版籍嵗減當時才百四十餘萬耳晉自武帝平吳之後編戶二百四十五萬九千八百自後南北幅裂戶無常數少者不盈百萬多者不過三倍隋文帝平一天下至大業二年戶八百九十萬七千五百三十六及乎唐之初年人戶不滿三百萬至髙宗永徽元年漸增至三百八十萬明皇天寶十三載巳前最為全盛只及九百六萬九千一百五十四自安史構亂之後屠戮生靈幾盡乾元已後僅滿一百至二百萬耳至武宗㑹昌年中其間相距百餘嵗才增至四百九十五萬五千一百五十一降及五代戰伐相蹂日益耗散是時四分竊據之地逐處戶口各有數十萬太祖皇帝建隆之初有戶九十六萬七千三百五十三自後取劔南平嶺表下江左闢湖湘所得戶口方逾百萬至開寶九年漸加至三百九萬五百四戶太宗皇帝至道二年巳增至四百五十一萬四千二百五十七真宗皇帝天禧五年又增至八百六十七萬七千六百七十七陛下御宇巳來與民休息至天聖七年凡計編戶一千一十六萬二千六百八十九至慶厯二年增至一千三十萬七千六百四十八戶八年又增至一千九十六萬四千四百三十四臣以為前代戶口之目三代巳降跨唐越漢未有若今之盛者也臣聞蚩蚩生聚蕃息衰耗一出於時政之所陶化是故明主知其然也則必薄賦斂寬力役救荒饉三者不失然後幼有所養老有所終無夭閼之傷無庸調之苦此乃陛下日慎一日以致其盛若遂與之休養則可封之俗不異二帝之世矣直勾衙前請限二年一替臣竊見河北沿邊諸州軍只管一兩縣處其得替押録里正人數至少供應衙前不足遂於近下散戶內直差未充衙前客司執役應副重難差遣並無年限替期且自來條貫應得替押録里正充衙前三年及二年滿日並放歸農蓋以先厯優輕令免重難一次所有直差衙前又不曽經厯優輕却令長入不與番替直候家産蕩盡方得逐便若比押録里正先厯優輕又有歸農年限則苦樂甚不均濟欲乞將應河北諸州軍直差衙前客司並與二年一替其情願永充者亦聽從便寬恤請差災傷路分安撫臣竊聞江淮兩浙荆湖南北路近嵗旱潦相繼粒食踴貴淮南西路蘄黃等州尤甚去秋霖雨殞霜損害苖稼今夏大水飄流居人兼又官中配糴民間之蓄盡輸入官官糴既多逮今五月不雨秋苖悉巳枯槁米價斗一百文縱江淮稔時米雖賤而民有饑者况遇凶年亦何卒嵗為其無備故也今則民間之蓄盡為軍儲矣民失其賴流亡日衆故賊盜充斥聚集成羣大者近百人小亦不下數十人所在剽虜官司不能禁自光壽以南距江亦皆如是州縣上下遞相䝉蔽不以上聞使朝廷無繇知之况今秋苗稼既槁則望在來夏而雕殘之民朝不謀夕豈能及來夏乎且天之降咎必在於凶年者蓋年凶則民饑饑則盜起盜起則姦雄出姦雄出則不可制矣豈可不深懼而豫防之哉伏望聖慈申命執政大臣應江淮兩浙荆湖等州軍自去夏至今秋灾傷甚處選差臣僚遍令體量安撫從便宜而賑貸之夫救灾恤患國之常也若忽而不顧寖成大患得不為朝廷之深憂乎再請差京東安撫臣近以京東盜賊充斥曹兖等州長吏乞别選差有方略臣僚及遣臺官一員往彼體量安撫監督諸州縣捕捉免成後患未䝉指揮緣京東素是出强賊處不可不即時誅滅若令結成羣黨藏伏山林則為害不細况臣嵎山纍年震動去春兖鄆又地震兼春前嵗星孛於虛危之次亦是齊分此皆變異之大者固不虛發不可忽天戒而不大為之防也且前代并本朝天下凡有灾傷盜賊即遣黜陟使或採訪安撫等使循行郡國今之議者必謂虛有煩費若其得人可以按察官吏能否詢訪民間疾苦俾之便宜從事所濟豈不大哉所有本路轉運使亦未甚振職乞於别路對換有才略者不然則敗事雖悔無及伏望聖慈特許檢㑹臣先進劄子所乞近差曹兖等州長吏并差臺官安撫事早賜施行請罷天下科率臣伏見自西冦巳來急於饋運常賦之外調發相繼天下民力殆巳竭矣且先朝當契丹未請盟之時宿兵兩路干戈日尋詎聞有今之搔動乎蓋郡縣長吏鮮得其人或遇非次配率競效苛刻貪官猾吏緣以為奸乘釁誅求不知紀極轉運提刑又不能察其贓否各徇顔情而巳且民者國之本也財用所出安危所繫當務安之為急安之在精擇郡守縣令及漸絶無名之率爾若乃橫斂不巳人懷危慮或因嵗之饑饉以吏之殘酷相應而起塗炭海內此乃心腹之患况巳萌之兆可不深慮乎臣欲乞今後應係軍需所用之物並令三司預先計度於出産州軍置場收買或非次急切須至配率者亦乞勘㑹各於出産路分專委逐處長吏於形勢物力戶內等第均配仍委知州通判親自監納兼令轉運提刑專切提舉體量稍有違越並乞重行朝典所貴重困之民漸獲蘇息請免江淮兩浙折變四章第一章臣竊見淮南江浙荆湖等州軍數年以來例皆薄熟去秋亢旱尤甚可熟三二分當年夏稅見錢一例科折內第一等折納小綾每匹一貫六百六十文省官絁每匹二貫八百五十文省其第二等巳下至客戶並折納小麥每斗三十四文省續據發運司准中書劄子據三司奏乞將慶厯三年上供額斛斗六百萬石內將小麥一百萬石大豆十五萬石折納見錢發運司遂相度小麥每斗并耗添估九十四文省大豆每斗并耗八十八文省比逐處見糴價例兩倍巳上應該小麥一石納見錢九百四十文省尋又准五月九日中書劄子據發運司奏竊慮豆麥價髙人户難得見錢奉聖㫖宜令本司疾速指揮逐路州軍據合折夏稅豆麥令人戶如願納見錢者即仰逐處依起納日在市價例錢數送納如只願納本色斛斗亦聽從便雖有前件聖㫖指揮本處官吏並不遵禀但一面抑令人戶納元估價錢不許納本色斛斗以致豆麥益賤錢貨難得下等人户尤更不易發運司但務嵗計充盈不慮民力困竭上下相䝉無所訴告為國斂怨莫甚於此且民者國之本財用所出安危所繫而橫賦暴取不知紀極若因此流亡相應而起塗炭郡邑則將何道可以卒安之况巳萌之兆不可不深慮耳兼自淮以南及兩浙荆湖從去秋至今春並未得雨二麥不秀耕種失時民心熬熬日懷憂懼欲望聖慈特降詔勑委逐路轉運提刑不住巡厯體量應是諸雜科率權且停罷若向去蠶麥稍熟今年夏稅諸色錢等除第一第二等户各令依舊折納外其第三等巳下并客戶特與免諸般支移折變只令各納本色庶使重困之民稍獲蘇息第二章臣近曽上言以江淮兩浙荆湖等州軍自去秋至今春未得大假雨澤二麥不秀耕種失時并去年諸處夏稅一例折納見錢小麥每斗估價九十四文省民間錢既窘迫麥又無用應急賤糶納官其直每斗不過三二十文中等巳下人户絶更不易今又時雨稍愆蝻蟲復作民心愁苦深可矜憫况東南奧壤國家仰之如帑府尤宜保固以制諸夏若不急於優恤繼之以重困獸窮則攫竊恐更為朝廷之憂爾臣先乞應係諸般科率權且停罷如將來蠶麥豐登中等巳下且令各納正稅本色錢等權免今年折變庶孤貧人戶稍獲蘇息至今多日未䝉指揮欲乞檢㑹速賜施行兼乞下諸路轉運司提刑司不住巡厯體量或有蠶麥不熟之處人戶申訴州縣不得抑退並令依例疾速差官檢覆開破逐色租稅免致流亡第三章臣昨於四月九日劄子上言以江淮兩浙荆湖等州軍自去秋至今春未得大假雨澤其中等巳下人戶夏稅乞不依去年折變見錢令只納本色又於當月二十八日上殿劄子亦乞令中等巳下人戶權免今年夏稅折變至今多日未䝉指揮兼諸處見今納夏稅若令一例折變深屬不便緣逐路今嵗蠶麥薄熟雨澤久愆耕種失時蝗蝻復起秋成未保人心益怖而又民間錢貨絶難出辦若不特賜寬恤竊慮下等不濟人戶以官錢窘迫必致流亡强壯者盡為盜賊老弱者轉死溝壑不獨搔擾郡邑抑亦離去畎畝矧國家財用所出盡在東南不得不深慮也又訪聞京東京西河北河東陜西今夏蠶麥例皆豐熟此乃天意欲少寬東南之民若此數路稍旱調度或急則朝廷縱有矜憫之心亦無所及然臣職賤言輕宜無采録但事體至大乞留聖意伏望陛下特出宸斷速賜指揮則一方生靈有再蘇之望第四章臣近者纍次上言乞江淮兩浙荆湖等州軍中等巳下人戶今年夏稅權免諸般折變祗令各納本色尋奉聖㫖送三司相度訪聞三司巳具申奏訖至今未降指揮緣諸路見納夏稅多日兼有路分絶逺之處若更稽緩竊慮後時即陛下矜恤之心恐無所及伏望聖慈憫此重困之民速賜指揮則天下幸甚請免陳州添折見錢臣訪聞知陳州任師中昨奏為本州管下五縣自去冬遇大雨雪凍折桑棗等并今年養蠶只及三五分二麥不熟全有損失去處除擘畫不放省稅外只乞與免支移折變巳奉聖㫖令京西轉運司相度聞奏竊知本路轉運司牒陳州令將今年夏稅大小麥與免支移只令就本州送納見錢却令將大小麥每斗折見錢一百文腳錢二十文諸般頭子倉耗又納二十文是每斗麥納錢一百四十文况見今市上小麥每斗實價五十文乃是於災傷年分二倍誅剝貧民也則民間錢貨從何出辦兼將客戶等蠶鹽一斤一例折作見錢一百文又將此一百文紐做小麥二斗五升每斗亦令納見錢一百四十文計每斤土鹽却納三百五十文况一郡五縣數十萬口非常暴斂小民重困體實非便欲乞特降指揮令本州疾速依見今在市二麥實價估定錢數令民取便送納見錢或納本色庶使京輔近地不濟人戶稍獲蘇息兼慮本路應係災傷州軍或有似此重行折變之處亦乞特行勘㑹速賜指揮若稍稽延恐無所及請救濟江淮饑民臣聞天以五星為府人以九榖為命五星紊於上則災異起於下九榖絶於野則盜賊興於外天之於人上下相應故天變於其上則人亂於其下是天人相與之際甚可畏也若變異上著則恐懼修省以謝於下年榖不登則賑貸豫賚而恤其困蓋不使天有大變而民有饑色則人獲富壽而國享安寧矣方今災異之變尤甚臣近巳論列詳矣惟江淮六路連嵗亢旱民食艱阻流亡者比比皆是朝廷昨遣使命安撫賑貸以救其敝而東南嵗運上供米六百萬石近雖減一百萬石緣逐路租稅盡巳蠲復則糧斛從何而出未免州縣配糴以充其數由是民間所出悉輸入官民儲巳竭配者未巳縱有米價率無可糴父子皇皇相顧不救老弱者死於溝洫少壯者聚為盜賊不幸奸雄乘間而起則不可制矣當以何道而卒安之哉且國家之患未有不沿此而致可不熟慮乎欲望聖慈特降指揮應江浙六路災傷州縣凡是配糴及諸般科率一切止絶如敢故犯並坐違制庶幾少釋疲民倒垂之急其上供米數若不敷元額即候向去豐熟補填仍令州縣官吏多方擘畫救濟饑民不得失所兼委逐路提轉專切提舉如不用心救濟以致流亡及結成羣黨即乞一例重行降黜請支義倉米賑給百姓臣訪聞江浙荆湖等路自去秋亢旱田苗一例災傷即目米價甚高民食不足若不速令救濟必致流亡强壯者起為盜賊老弱者轉死溝洫因此生事為患不細緣逐州除軍糧常平倉外别無大假斛斗准備竊知王琪見起請義倉所在見管米數稍多州縣必未敢專輒支用若一一取候朝廷指揮往復數月當此艱食之際恐無所及欲望特降指揮下逐路轉運司勘㑹轄下元係災傷州縣如委實人戶闕食即令晝時將義倉米速行賑濟以濟貧民如允臣所奏即乞早賜指揮論江西和買絹臣竊聞江南西路今年和買絹價轉運司並以米鹽充折并轄下州軍和糴斛斗多是抑配人戶緣本路亦係災傷地分民食甚艱若重有搔擾必致流亡伏覩慶厯七年南郊赦文內江西一路多以米鹽充折絹價虧損下民仰轉運司今後須管支見錢和買今本路轉運司顯是故違制㫖專輒施行且命令者人主之柄而治亂繫焉凡朝廷降一命令所以示信於天下若有承受委而不顧乃是命令之不足遵守俾四方何以取信則朝廷綱紀亦緣此寖隳矣欲望聖慈特賜勘問施行所有斛斗並令依舊例和糴不得抑配人戶論放缺臣伏覩明堂赦書應今日以前天下缺負官物并於干繫保人名下催納無非侵欺盜用或雖是侵盜見今本家并干繫保人內委無抵當者並令本屬及轉運司保明聞奏其纍經官吏保明三司未與除放者限赦到一月內令本處先具自來保明度數申本路轉運司疾速保明繳連聞奏當議並與除放此誠陛下優恤元元如是之至也然臣厯觀前後赦文凡所恩貸無不周悉而有司往往廢格不即遵行臣竊聞真宗咸平年中親御便殿放三司所引諸色違缺凡四千一百六人計物八萬三千數蓋先帝以恩詔每宥通責有司必究問本末或縲繫追逮益為煩擾故命以籍引對而面釋之大哉先帝憂民軫物之心惟恐不及伏望陛下特降指揮委三司將應係諸色逋缺人各具因依一一類聚備録申奏並令引見詳酌除放如此則恩出於上敝絶於下矣請權罷陜西州軍科率一鳳翔府斜谷造船務每年造六百料額船六百隻方木物料等自來分擘與秦隴鳳翔府諸處採買應付慶厯六年七年材料等共三十二萬見缺七萬有零慶厯八年材料等共二十一萬七千有零全缺一斜谷務又打造咸陽陜府橋腳船四十四隻合用材料共三萬一千有零見配買次一修河樁橛共四十五萬一千六百五十二條係七州科買一上京材木共九萬三千一百五條各係大料木植十四州科買一採斫澶州河中府纜索竹一百五十萬三千八百二十竿見差人司竹監斫次一買上供肉羊兔千口係十九州軍一買紫草一萬斤係十州軍一買紅花四千斤係六州軍右具如前臣勘㑹鳳翔府造船場每年額船六百隻其方木料並是本府并隴州量支官錢收買及於秦州採斫所差衙前例各倍錢一二千貫前後人戶破蕩家産不少每戶錮身者不下三兩人經年未得了當時准三司牒買修河樁橛四十三萬餘條亦於永興等七州軍配買比之常嵗多兩倍巳上并河中府澶州要纜索竹一百五十萬竿見差人司竹監斫次今又准三司牒採買上件材木九萬三千條有零亦是分配永興等十四州收買緣並係大料木植只是秦州出産又聞深入番界採斫至難其餘不産州軍須至差衙前分買况陜西州軍一年之內三五次各是大假科配兼又錢法改更之後民間即目大假不易若稍不行寬恤則疲困之民無保全之望雖詳省中書劄子住九年十年科買又只聞說肉羊紫草紅花之類並是小可物色亦易為應副所有逐年買造船場材木物料及樁橛等最為大害乞賜詳酌指揮權與蠲免請將邢洺州牧馬地給與人戶依舊耕佃第一章臣竊見河北漳河淤地名為沃壤而廣平監於邢洺趙三州共占民田約一萬五千餘頃並是漳河左右良田每牧馬一匹占草地一百一十五畝兼知衛州淇水監每馬一匹止占地三十一畝其廣平監剩占八十四畝兼廣平係兩監自後停廢一監三州共約退下草地七千五百餘頃往嵗官司遂令百姓請射出租課佃時年嵗深逺耕為熟田就種巳成園林及作父祖邱塋其佃戶共九千三百四十餘戶每年共約共粟八萬七千五百餘石小麥三萬一千二百餘石稈草五十五萬六千餘束絹八百餘匹昨准羣牧司指揮令逐州作二年盡起遣佃戶却收其地入官今年限滿人戶全不肯起移纍經鼓司進狀及三司亦曽論列不報訪聞廣平雖再分為兩監馬只有五六千匹不及往時一監之數亦不銷得此地枉有廢為間田縱添得馬三二千匹况元占牧馬一匹之地比淇水監可就牧三匹亦未為闕事緣河北西路惟漳河南北最是良田牧馬地巳占三分之一東路又值橫隴商胡决溢占民田三分之二乃是河北良田六分河水馬地巳占三分其餘又多是髙柳及澤鹵之地俾河朔之民何以存濟欲乞且令人戶依舊耕佃供納租課若據一年所得亦可置數倍鞍馬公私大利無甚於此伏望聖慈體念河北人戶纍值災傷流亡未復豈忍更奪其衣食俾之失所有傷和氣無益仁化又况與國家嵗出斛斗萬數不少經久實為穩便伏望出自宸斷特降指揮第二章臣近為廣平監牧馬草地乞令人戶依舊佃種至今未降指揮切緣廣平監元係兩監於邢洺趙三州內共占民田一萬五千餘頃頃由停廢一監共約退下草地七千五百餘頃官司令百姓出租課請佃年嵗深逺耕為熟田及作父祖邱塋其佃戶共九千三百四十餘戶每年共約出粟八萬七千餘石小麥三萬一千餘石稈草三十五萬餘束絹八百餘匹昨准羣牧司指揮令逐州作二年起遣佃戶收地入官今年限滿人戶全不肯起移纍曽進狀不行况兩監馬只有五六千匹不及往時一監之數亦不銷此地枉有廢為間田縱添得馬三二千匹若比淇水監一匹之地可就牧三匹甚不闕事臣前進劄子見下羣牧司相度必是妄說事端故要占留欲乞特出宸斷指揮令人戶依舊耕佃輸納兼據一年所得亦可置數倍鞍馬公私實為大利請放髙陽一路缺負臣昨任髙陽關日以部下十一州軍諸般缺負並係明堂赦前令該除放緣逐州軍從前失於舉行臣尋具缺折因依保明申奏乞與除放巳䝉三司送本路轉運司再令勘㑹至今未盡結絶况前件缺負委是逃亡人户其間或有存者又無家業抵當即不是侵欺盜用今又該南郊大赦欲望朝廷特賜指揮檢㑹臣前狀盡與除放請免沿邊人戶折變臣伏見河北沿邊州軍逐縣户口至少雖有田土以迫近塘泊遞年例皆淹潦秋夏未嘗收熟極邊之地民力重困不可不優與寬恤本路轉運司依自來體例二稅一切折變支移輸納不逮流亡者甚衆欲乞特降指揮委轉運司勘㑹應沿邊州軍見係塘泊接連之處人户二稅今後只令納本色更不得一例折變及支移使知朝廷惠養之意則緩急可用接送北使三番臣近聞聖慈以接送契丹國只使往來更不差三番只令近上使臣管押金器沿路充用並委逐州縣長吏通判及令佐巳下一切應副中外聞之莫不欣忭以為數十年之弊而陛下一旦罷去使河北生靈有來蘇之望今聞內降指揮復置臣未測緣由徒用驚駭且三番為河北之患積有嵗年日甚一日誅求搔擾公私不勝其害臣頃年曽差充送伴人使且知蠧民殘物之甚亦嘗論列緣河北連綿災傷流亡未復若不省猺役罷配率次寬養凋瘵是棄河朔也况陛下矜念哀憫之極故特行前詔此為至當今乃無故復置竊為陛下痛惜之惟陛下特留聖意且依前降指揮寢罷則天下幸甚論修商胡口臣伏覩近降勑命商胡口只候來年秋修塞合要物料令三司檢㑹天禧年修河體例敷配所貴衆力易集臣先奉聖㫖與兩制巳上定奪修閉利害以商胡經久須合修塞方免河北水患今准指揮來秋修塞必是河水令歸故道緣前來纍經差官相度工役五十餘萬三二年間恐未了畢若河水匯住未得通快則商胡固難豫修修之則潰溢之害立可待也况頃嵗之决秪以故道橫隴壅閼水勢不快遂致潰溢今若不先議開理水道使之浚流便欲修塞商胡不惟必有後患乃是重起八年科率之弊虛困六路凋殘之民耳欲乞朝廷且據計度到故道工役先令差撥兵夫漸次開理或一二年內功可必就即委三司豫行計置物料若是全出民間事必難集蓋諸路久經災傷雖京東京西河北陜西近嵗稍稔然富者竭於率斂貧者見巳流離倘不恤他虞遽興大役臣恐朝廷之憂不獨在商胡矣伏望聖慈特出宸斷以河朔久罹水患須議疏塞即乞且輟郍內藏庫見錢百萬貫令三司專功收管積薪聚糧豫為具備其餘即令中等巳上人戶敷配候開淘舊道水有所歸則商胡之塞一舉可成所貴民力稍寬功用無乏請出內庫錢帛往逐路糴糧草臣前年夏間因送伴比使回見河北麥熟價賤乞支借見錢及時收糴外可以實邊備內可以寬國用雖尋差監察御史劉元瑜往彼催促緣河北錢帛有限竟不能廣有積聚以備將來臣去秋赴任京東日竊見朝廷差仲簡宋選陳榮古往三路便糴臣亦曽上言以逐處少得見錢恐難集事欲望特出宸斷權於內帑支借見錢或絹帛百餘萬與逐路乘此之便廣謀收糴俾邊廪稍實有數年之蓄庶少寬聖慮而位疏言賤未賜開納臣今䝉恩改授陜西緣西鄙用事以來關中生聚凋殘尤甚物貨踴貴且朝廷所以納元昊誠欵許之自新者蓋欲少紓民力耳今邊事雖粗寧息而屯兵防守調度浸廣錢貨積弊倉庾殆空如緩急有事亦未免重困生靈况財用一出民間當今之際切在安而勿擾之安之之道惟在不橫賦不暴役若誅求不巳則大本安所固哉伏望陛下少留聖意大緩吾民以安天下應三路用度不足且以內帑錢帛借助以惠元元民心茍安則醜虜曷足慮哉領陜西漕日上殿臣昨任京東轉運使日竊見轄下州軍諸色人等係積年缺負官物錢帛斛斗等共約二萬貫石其干繫人數不少並是主持倉庫以年嵗深逺因循消折即無欺蔽或本身死亡或家産蕩盡見今均在干連及保人處理納皆是不濟人户看詳先降條貫合該除放臣在本任日纍次保明申奏終未奉指揮省司凡下文牒催理州縣逐次承禀舉行終無毫忽錢物納官但虛成搔擾重困疲民於國未有小益於民乃為大害官中縱不除放人戶亦無可送納欲望聖慈令檢詳前狀特降指揮庶破蕩之家稍獲存濟兼恐天下諸般缺負官物內有别無欺弊合行除放見行催理者不少亦乞下諸路轉運司勘㑹保明如依應得先降條貫並與放免乞開落登州冶戶姓名臣竊見登州鐵冶戶姜魯等十八戶先陳狀為家貧無力起冶遞年只將田産貨賣抱空買鐵納官乞依條例開落姓名臣在本路日纍次保明申乞與除免又准省牒勘㑹逐官往彼相度兼臣親自巡厯到登州萊州子細體量得姜魯等逐家委是貧乏積年不曽起冶再具保明申奏至今未見指揮臣因訪聞得舊來州郡最出鐵貨緣人戶先乞起冶之後或遇家産銷折無鐵興作官中並不認孤貧一面監勒送納元額鐵數以致破蕩資業沿及子孫不能免者比比皆是雖遺利甚厚而富民懼為後患莫肯興創所以鐵貨日削經久不興欲乞今後應係冶戶或有委實家産銷折無力造作者並仰差官子細勘㑹如無弊幸即晝時保明申轉運司與除落姓名訖申省若州縣故縱及人戶妄有規避即許人告首官吏重行朝典告人與賞錢一百貫文仍令州縣常切多方招召諸色人起冶不得住滯邀難如是人戶樂為鐵貨增羡寬民利國無甚於此請罷同州韓城縣鐵冶務人戶臣近聞同州韓城縣鐵冶務自來定占七百餘戶內二百餘戶厚有物力比見充里正人戶並各髙强只以冶戶為名經今五十餘年影占州縣諸般差役其冶戶內係第一等者每戶逐年供給冶務諸般所出錢不過三貫文外更别無所費况官中所得鐵貨只及十餘萬斤仍官支買炭并工匠錢三百餘貫更差專監使臣一員兼體問得本縣人戶以冶務全占却上等力役及致下等人戶差役頻併供應不前若將上件鐵數據等第均在一縣人戶上每約納官鐵嵗不過十斤至二三十斤况本處見賣每斤價錢二十四五文每戶嵗納官鐵約費三五百文雖自來官禁烹煉彼中私賣甚多令百姓取便烹煉必然鐵價轉下兼令赴本縣送納於民至便又減省得監官一員只令本縣令佐專管給納仍得二百餘戶兼充重難役次頗甚均濟臣在任日方欲行遣屬以移任欲乞下本路轉運司選差清幹官員往彼相度施行論瀛州公用臣昨奉勑就移此住緣本路久經災潦流亡未復臣自蒞事以來應係兵民邊防凡干利害敢不悉心措置然而路當衝要使介相望迎勞供費之繁因循浸久臣方欲裁損一二而議者亦已云云孤危之跡不皇啓處勘㑹本州公使錢每年二千貫凡百用度盡出其數看詳舊例紛委無算今若據犒設軍員並依舊外其諸般用度頓行減罷則衆論未以為允或且仍舊則支費至廣未知所濟臣遂將前任自皇祐元年八月至皇祐四年八月終三周年計算約費用過錢三萬三千貫文省是每年約用錢一萬一千貫文竊緣本路州軍公使錢除雄州每年五千五百貫文外自餘瀛州莫州恩州例皆每年二千貫文况瀛州自分四路之後屯集軍馬事體用度與恩莫州不同無慮數倍欲百端圖畫亦所不逮若不害公則必傷民臣設於用度中量減其半則每年尚使錢近六千貫除省錢外亦少四千貫文若依近降指揮廣務回易亦恐所得不能滿數况又河朔連嵗不稔水潦未巳民力重困豈忍過有誅削以逭不虞之謗哉欲乞朝廷以雄恩莫等州公使錢參校特賜詳酌指揮或委本路轉運使提㸃刑獄躬親取索合破錢數并前後體例别立酌中定制俾經久遵行臣以無狀猥叨擢用公家之事不敢顧避然飾厨傳稱過客上下承習為日持久所積未及毫末議者巳駭聞聽竊慮愛憎之口因起中傷之語疏外難立孤直易搖臣固不以毁譽之私變初終之節伏望陛下俯矜愚拙曲賜保全或謗毁之緣生繄聖神之明辨誓殫勤瘁上答隆私臣無任惶懼激切屏營之至請罷里正只差衙前臣伏見知并州韓琦上言乞罷諸路里正逐鄉稅賦只委戶長催納三司巳牒逐處轉運司相度去訖臣昨任河北備見諸州軍所差里正只是准備衙前其秋夏二稅並是户長催驅重役之中里正為甚每縣或無上等即以中等戶充家業少有及百貫者須充衙前應副重難之役例皆破蕩其逃亡非命者比比皆是怨嗟愁苦所不忍聞今若依韓琦起請悉罷里正如衙前有闕即委令佐於一縣諸鄉第一等中選差物力最髙者充役如更有闕亦如此輪差委是經久公私利便庶幾凋殘之民稍獲存濟又緣里正係正月內差若伺候諸路轉運司相度必恐遲延欲望聖慈特賜詳酌早降指揮施行包孝肅奏議集卷七
