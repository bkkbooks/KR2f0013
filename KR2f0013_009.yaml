body:
  text: 包孝肅奏議集卷九宋包拯撰議邊進張田邊説狀賜張田勑書附右臣以懦庸之質荷邊帥之任才輕責重不能稱職進退殞越罔知所措伏自北虜請和以來邊境無事垂五十載守禦之備因循浸久將領之選未甚得人卒伍之輩復多驕惰若不精加擢擇一旦緩急用人以庸謬之將總驕惰之卒必先事而敗雖有犀甲利器焉所施哉况虜中日有事宜姦詐萬狀不可謂要盟甚固萬無負德往年之事亦可明矣孫子曰無恃其不來恃吾有以待之也無恃其不攻恃吾之不可攻也若沿邊長吏兵官悉得有才之士委而用之上下協濟庶幾後患可弭臣昨待罪諫署未嘗不論列及此今叨邊寄安敢循默而不傾竭愚慮圖所以為報哉臣竊見殿中丞通判信安軍張田性質端徑文藝該博周知河朔之事嘗著邊説七篇詞理切直深究時病輒敢繕寫進呈伏望陛下萬機之暇少賜觀覽則沿邊利害粲然可見仍乞宣諭兩府大臣參議可否鋭意而預圖之實天下幸甚凂瀆宸聽臣無任悚悸激切屏營之至勑書下安信軍通判殿中丞張田勑張田省髙陽關路都部署兼安撫使知瀛州包拯奏竊見汝性質端徑文藝該博周知河朔之事嘗著邊説七篇詞理切直深究時病輒敢繕寫進呈仍乞宣諭兩府參議可否事汝舉術精深志慮宏逺能窮邊瑣善啓忠規文成七篇説通三訓雖杜牧之之注孫子臧嘉猷之集羽書會稡研覃曽不是過也覽觀之際良深歎嘉故兹奬諭想宜知悉論邊將二章第一章臣近者纍曽上言以河北沿邊將帥未甚得人特乞精選其代州尤不可輕授緣代州與雲應等州相去至近路又坦平古今最是難控扼之所太宗朝以驍將楊業守之業歿繼以給事中張齊賢守之其慎重用人如此自後邊鄙無事然亦用武臣中有材略者今朝廷委任郭承祐必恐敗事按承祐纍任無狀朝野共知物議喧然以為不可且北人請命厯年多矣然恩過則生驕安久則忘備理之常也况西北二人自古嘗惡其連盟協勢以為中國之患以今觀之釁端巳兆廟堂之上所宜窺之未萌而為國家鋭意而逺慮也今天下不患乏人患在不用用人之道不必分文武之異限髙卑之差在其人如何耳必當考以應敵制勝之略詞以安邊禦衆之宜觀辭氣之瓌竒舉動之方重者擢而用之則取人之要無大於此况河北河東同時地震變異如此不可不懼臣先進劄子言之頗詳其承祐欲乞早令召還别用能者沿邊守將畏懦不勝任者亦乞速賜移易若不預為之具緩急圖之則無及矣惟陛下特留聖意則天下幸甚第二章臣近到本任訪聞契丹自賀乾元節人使回後即目頗增幽涿等州兵官及不輟移易軍馬觀其姦計殊未可測况沿途城寨如雄霸保等州安肅廣信順安等軍最是要切之地與北敵接境路徑平坦絶無險隘控扼之所全籍守將得人以為備禦緣逐處知州并兵官向來輕授未甚選擢若非綺紈少年即是罷軍老校但持張皇引惹之説以為身計其他訓練備禦之法有名無實此最河朔之大患也即今邊任守將當無事之時俾蒞一郡或無敗闕若猝然用之禦冦必先事而敗矣欲望聖慈特賜指揮令於武臣中不以職位髙下但素有武藝才略可為將領者精選三數人若先有微纍亦棄瑕録用俾分守沿邊要郡訓練兵甲大為之具庶幾上下熟其節制緩急用之則沛有餘力而後患可弭矣伏望聖慈早賜裁處施行請選雄州官吏臣昨送伴虜使到白溝驛竊見瀛莫雄三州並是控扼之處其雄州尤為重地今髙陽關一路全藉塘水為固然雄州據塘水之地州城至北界只三十里路徑平坦絶無蔽障之所其間居民又係兩地供輸以至本州衙校及諸色公人等多是彼中人戶充役凡欲商量處置事宜必被窺伺往往先意漏泄竊恐浸成大患若知州通判駐泊都監等各得其人則責以撫馭守邊之術凡事遞相關防必無他虞萬一輕授即未免為朝廷之憂緣塘州軍可為邊境之固者乃北倚雄州為重耳雖城壁堅峻而兩界人戶悉處其中深可為慮也欲乞特降指揮今後應雄州通判駐泊都監等並令特選慎重有材略及武藝之人庶免敗事兼髙陽關主兵帥臣亦乞早賜差選論契丹事宜三章第一章臣伏見契丹近遣人使復有請求今朝廷重遣使命以答其意者蓋羈縻不絶之誼也且北敵自先朝請盟之後邊鄙無事垂四十年近因昊賊背畔以來邀乞無厭情偽可見臣訪聞契丹官吏薄於俸給人民窘於衣食故自將相而下以及族帳久萌南牧之心所未欲者特其主耳亦非甲兵用度之未足種落上下之未和其力固有餘也所以然者以國家嵗入數十萬計往還聘問之禮未之或闕無釁而動佳兵不祥不欲曲在彼耳非有服仁義崇德讓之道也其貪而好利忍而好殺強則驕傲弱則卑順率北方之天性也故自古聖王以要荒治之來則驅而御之去則備而守之此制逺人之常道然無代不為中國之患議者或謂四夷乃支體之疾夫支體之疾亦根於心腹矣茍支體未寧則心腹安得無患願陛下深鑒於此慎無忽焉又慮陛下左右或言事者有以契丹無事以安聖意謂彼君臣樂我和好盟誓甚固萬不負德竊恐有誤於陛下也兵法曰無恃其不來恃吾有以待之也無恃其不攻恃吾之不可攻也今既無故遣使是必以不可從之事為請乃其詭計耳但小不如意則欲以為詞况今夏地震於并代之境蓋隂盛之象且北方者中國之隂也又震於純隂之地此天之有以示戒也豈徒然哉彼必有潛謀構隙之志尤不可不深慮也臣竊知沿邊諸將未甚得人皆售進市恩結援固寵不講方略不訓士卒撫馭無術勞逸不均以致邊備未完邊廪未實一旦急用必先事而敗且河朔地方千餘里别郡數十與遼界連接深入之患甚可虞也而郡無善將營無勝兵卒有來如疾電去如脫兔緩急之際曷以禦之臣每念至此寒生毛骨况觀今來事勢乃必然之兆雖命兩府重臣往逐路宣撫措置更望陛下頻召執政大臣與總兵將帥乞丁寧訓諭俾圖議謀䇿選求將帥精練卒伍廣為積聚以大警備之不然則懼貽陛下之深憂也臣區區之心無所云補惟陛下裁擇第二章臣聞北方為中國之患其來久矣以古揆今未有恃盟好舍武備而不為後患者國家自契丹請命逾四十年沿邊卒驕將墮糧匱器朽主兵者非綺紈少年即罷職老校隱蔽欺誕趣過目前但持張皇引惹之説訓練有名無實得不熟慮乎臣昨奉命出境遼中情偽頗甚諳悉自創雲州作西京以來不輟添置營寨招集軍馬兵糧積聚不少但以西討為名其意殊不可測緣雲州至并代州至近從代州至應州城壁相望只數十里地絶坦平此漢與胡古今所共出入之路也自失山後五鎮此路尤難控扼萬一侵軼則河東深可憂也不可信其虛聲弛其實備兼聞代州以北纍年來蕃戶深入南界侵占地土居止耕田甚多蓋邊臣畏懦不能畫時禁止今若不令固守疆界必恐日加滋蔓窺伺邊隙寖成大害銀方成等亦緣此而致切不可忽也况邊上將帥尤在得人昔太祖經營四方選勇幹忠實者分控邊陲以何繼筠滄景李漢超關南以備北虜郭進邢州以禦太原姚令斌慶州董遵誨通逺軍以捍西戎傾心委之錫賚殊異皆一任十餘年不遷卒獲其效今則不然蒞事未幾即從遷徙又何暇於訓練備禦乎臣欲乞今後應沿邊要衝之處專委執政大臣精選素習邊事之人以為守將其代州尤不可輕授如得其人責以實效雖有微纍不令非次移替所貴軍民安其政令緩急不至敗事第三章臣等昨於正月初五日離北朝四日夜正旦館伴并生辰館伴與生辰國信使張堯佐副使張希一及臣等共十人同坐欲排夜筵方喫茶了其生辰館伴副使張宥等先言云請暫約退左右有事要説左右既退張宥等言云雄州開東南便門多納燕京左右姦細等人詢問北朝事宜隨事大小各與錢物此事甚不穩便請説與雄州臣等與張堯佐等即時以理對答且巳相次張堯佐等依例先退臣等飲酒易衣而罷至來日到中路未坐御筵之前先令人白館伴欲要咨聞相次館伴召臣等於廳上六人同坐臣等説與館伴云昨夕示諭雄州之事為未知子細不復欵答及至飲罷之後召上節中曽有在雄州指揮者方子細詢問開便門事其人言雄州日近不曽開門凡有門戶並是舊來開置臣等尋語館伴云此事的不足憑設使雄州誘納姦細自有正門出入何必創開一門若只是郡中創開門戶出入此亦州郡常事何關兩朝之事若或北朝燕京及涿州等處開門本朝豈可言議兼本朝每戒沿邊不令生事非不丁寧邊臣豈敢容易只如北邊臣僚近年侵入南界創立城寨必是北朝不知知之必不容許况兩朝載言誓書若欲歡好無窮莫若遵守盟約各保疆界其館伴見臣等如此言説但言極是頗有愧色及臣等到雄州子細詢開門去處並是李允則巳前曽開後來别無創置臣等合具奏聞欲乞密誡雄州凡有體探事宜更加慎重免致漏泄論昊賊事宜臣竊聞余靖近進北朝回書其意未順今楊守素朝辭將發未審朝廷如何處置今若納元昊誠欵仍賜誓書竊恐北朝因之得以為詞於理未便緣北朝結好四十年矣事無纎巨莫不徇從一旦驟違其意非計之得也况事體至大若不出於成算豈可容易擬議哉設欲恃北人之舊好納西戎之新欵縱無後患亦防他變得此失彼恐未為福萬一敵情忿戾乘釁而動則曲在我矣歡盟一失追悔何及此乃繫國家安危之機可不慎乎兼知元昊先所陳請或未盡從且可再令商量稍緩其事數月之內彼中事機盡見然後圖之惟陛下特賜省察論楊守素臣伏見西賊再遣楊守素詣闕請命而朝旨方議納其誠欵此亦安民禦邊之長䇿也風聞道路云元昊欲嵗納青鹽貿易茶貨然未審虛實緣元昊數州之地財用所出並仰給於青鹽自用兵以來沿邊嚴行禁約者乃困賊之一計爾今若許以嵗進數萬石必恐禁法漸弛姦謀益熾不惟侵奪解鹽課利亦慮浸成大敝關防或未能制若稍行捉捕則棄前恩結後怨此亦必然之勢也議者復欲令運於關東支用或許客人禆販則又不免配率車乘轉成搔擾固朝廷所宜慎重此舉如不獲巳則不若於前來許賜帛繒茶貨數量與增加亦可以弭亡厭之求兼此劇賊猖狂難保沿邊塞柵備禦之具亦不可少懈緣臣疏外之職素不預議但采於物論知所以然敢罄公言少禆萬一論保州事臣伏見保州城內兵士等自殺害官吏以來朝廷纍行招諭及一面進兵攻取至今固守未下况地據要害境接敵界兼訪聞契丹見屯兵界上以防託為名其安肅軍廣信軍切須以宿將重兵鎮守控扼以備侵軼之患且兵家之法惟務拙速今若用兵進討則城堅難拔降勑招諭又人心未信倘不别議借置必恐變故難測此誠事機危迫之秋也固不可以尋常容易處之欲望聖慈於內臣選擇素有材辨可任者令齎密詔往彼縋入城中以詔旨一二親自宣諭俾逆黨知朝廷並貸前罪普與昭洗之意縱逆黨迷惑未即信從其間詿誤脅從之人以使命在彼必有他變或翻然改圖矣昔唐德宗朝李懷光據河中叛纍命將帥攻城不下乃以給事中孔巢父及中使持詔入城慰撫未久部將牛俊斬懷光以城降此亦前事之可驗也若但以詔勑於城外招安緣此輩自知惡逆罪不容誅亦未審朝廷確然推誠信寬貸之恩以城壁堅固糧食充足且務偷生茍延月日雖欲必取又緣諸處卒伍素不訓習攻城之具亦旋創造不惟進攻之後城中生聚枉遭塗炭兼恐兵士等所傷必甚萬一别有他虞事體不小尤不可不深慮也以臣博採外議若令親信內臣齎詔入城諭以赦宥許其自新事必可濟於理亦便乞河北添糴糧草臣纍曽上言以河北河東沿邊守將未甚得人特乞精選帥臣訓練卒伍廣為聚積以防後患而位疏言賤未賜開納臣昨奉命出疆詢訪契丹情偽亦甚諸悉蓋彼處官吏薄於俸給人民苦於衣食其下族帳各萌南牧之心所未欲者獨其主與一二將相而巳亦非兵力用度之不足蓋利國家嵗入數十萬不欲無釁而動耳然點集軍馬創造兵器無日無之觀乃所為其志不小而議者但欲少安聖意謂彼君臣樂我和好盟誓甚固萬不負德竊恐有誤於陛下也孫武曰無恃其不來恃吾有以待之也無恃其不攻恃吾有所不可攻也况河北河東京東地震尤甚沿邊大水並隂氣極盛之象兼又五星屢失躔次此皆災異之大者且天之示變蓋不虛發所以警悟於陛下勤勤如是固不可推咎四夷以忽天戒也其邊上事宜不可不速為備禦之具今雖遣臣僚往三路便糴緣逐處少得見錢恐難集事欲望特出宸斷許於內帑支見錢或絹百餘萬匹逐路乘此之便相兼收糴俾倉廪稍實有數年之蓄庶少寬聖慮然後日御便殿召執政大臣與總兵戎帥丁寧訓諭俾謀議畫䇿講求將帥練習兵旅繕完城壘以先警備之况當此可為之際若不鋭意速圖但務因循憚於更張措置恐非宗社之福必貽陛下之深憂也臣區區之心不能自巳惟陛下留神省察再請移那河北兵馬及罷公用回易臣竊見天下之患在乎三路而河朔為患最甚冗兵耗於上公用蠧於下內則致帑廪空竭外則致生靈困敝臣前後纍次論列乞那移兵馬於河南州軍及罷諸處公用回易尋委逐處安撫轉運司相度終未見果決施行况北敵請和四十餘年嵗遺金帛數十萬者是欲寬國用而紓民力爾今邊鄙不聳正是保國息民之時而屯兵益衆用度益廣每年河北便糴糧斛三四百萬石約支見錢四五百萬貫僅有三二年之備雖朝廷竭力應副亦所不逮日甚一日恐數嵗之後必有不可救之患至如寶元以前天下無事財貨充足一旦昊賊猖獗調發旁午公私窘絶迄今未復以今事勢較之往日則不侔甚矣萬一或有警急何以取濟且燕雲者四支也河朔者心腹也幸而外無敵國之虞而令河朔塗炭如此是防手足未然之患而自潰其心腹也則朝廷安可不深慮而務救之之䇿乎若上下協心更張措置如反掌之易而有太山之安又何憚而不為哉欲望聖慈宣諭兩府執政大臣應沿邊及近裏州軍兵馬除合留防守外其屯駐駐泊諸軍悉令歸營就糧諸軍即分屯於河南兖鄆等諸州率三年一代遇有邊事即時起發不旬日可到豈有後期不及者邪其諸州公用錢除沿邊及人使路分州軍量與增添外諸路一切禁止並不得回易則國用民力漸可完復惟陛下矜念元元斷在必行若更令逐路相度則互執所見益無涯矣臣區區之心不能自巳伏乞陛下留神省察請擇探候人臣竊見沿邊州軍探候事宜於體最急舊日何承矩李允則識敵之情偽大小必得其實後來葛懷敏亦能使人自王德基王仁朂後惟務邀功冒名所遣既不得慎密之人且從而聲張之是致契丹纍次全家捉過漢人去界上多添巡邏驗認于今全不能深入只是到得四𣙜場及幽涿間傳得民間常語或虛偽之事便為事宜且諸處自有機宜一司所管金幣不少自來只備支賜與探事人近年甚有侵借過處兼沿邊守將類不得人但圖進取殊不以此為意正恐一日賊及境而不知也欲乞應係沿邊自來探候事宜州軍密令知州通判及舊例管機宜人等盡籍見在當事人姓名仍具機宜司見管金幣多少自來每得甚事支與何等物幾月日可來一報仍令多方求訪舊日曽經探事人使用新差少年不諳事者並令廢罷及只令探首領所在任將相何人山前山後人哀樂如何諸國臣與不臣并訓練點集兵馬造作姦謀年嵗豐凶轉移糧草凡干大事即許申報自餘打圍移帳放赦修城細碎尋常衆人所見虛偽傳聞之事並不可納徒廢金幣無益於事伏望聖慈特降指揮仍乞嚴賜約束不得漏泄所貴逐處官吏用心緩急免致誤事論蠻賊事二章第一章臣竊見廣南東路鈐轄司奏據連州申勘到行者孫之道稱蠻賊等三千餘人商量入連州打劫勘會彼中兵甲數少巳差奉職周僧辨帶兵甲一百人前去防托者緣廣南英韶連賀四州並與湖南郴衡道永等州相接自蠻賊騷動以來彼處稍有備擬鹵略無得賊計必謂嶺南無備有侵軼之意兼聞八月九日蠻賊五百餘人打劫連州桂陽縣兩村人戶財物牛馬不少今來賊勢轉盛所差兵級數少必難枝梧况廣南州郡並無城壁及攻守之具加之兵力綿薄無堪用者若不速議措置使此賊得便乘虛深入曷以禦之欲望聖慈特降指揮下本路轉運鈐轄司令於逐州界首可控扼之處相度添置寨柵屯兵防托以警備之不然恐為患轉大貽朝廷之深憂也第二章臣竊聞廣南東路鈐轄司奏蠻賊二千餘人入連州界打劫殺害人命及使臣等并轉運司奏乞差禁軍及選有將略武藝使臣前來防托捉殺者臣先曽上言以連賀英韶等州最與荆湖南路接界切慮蠻賊以嶺南無備乘虛深入緣彼中州縣並無城壁及攻守之具兵力綿薄山路險阻緩急救援不逮乞於逐處要害可控扼之所相度創置寨柵屯兵守把今蠻賊纍次打劫其勢稍甚若不令速剪滅為患不少如候朝廷差撥禁軍恐無所及緣北人乍到不諳風土多染瘴疫之疾竊見唐時或嶺南叛擾並自江西起兵進討况虔吉等州疆境相接民俗頗同若選差使臣往彼抽發兵士或召募就近應副事體至便地里不逺人心可用欲望速降指揮包孝肅奏議集卷九
